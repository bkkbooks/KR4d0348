body:
  text: 張氏拙軒集卷四宋張侃撰詩題剡溪圖欲識詩清處須來天盡頭可人一溪雪催我上扁舟贈别野樹參差緑山花零亂紅夕陽一樽酒聊與故人同雨中寒山草木踈蒼翠因雨濕日暮來不來前溪借蓑笠花珠二絶雨細成珠琲紛紛入緑花緑花無不濕傾處又成波階逺滴成聲荷深圓又碎風動水銀收亭亭開翡翠古語云夜雨滴空階滴入空階裏空階滴不成滴入愁人耳智果院前輩經行處壁間題小詩梅花還好否要見出塵姿嘲梅花緘蘂怯寒風清香已暗通數株籬落外生育任元功梅花謝嘲騷客多吟詠無非泥酒杯君知儂淡泊嵗嵗幾畨來梅花自解孤根在寒谷無分逐東風流輩剛言好中心只固窮理髮有白者今年三十六吾髮白雙莖不耐秋霖滴愁濃遣未平韓致堯詩一滴秋霖白一莖春去春去留無計殘花更可人多情玉蝴蝶隨雨伴香塵題鎮㕔西軒焚香覺心清觀書消日永門前剝啄稀且喜官職冷十五夜月二絶閒來庭下立月影照人清偏到中秋好遲眠已四更秋光初破蘂香逺逐人來多是蟾宫種何妨兩處開十六夜月二首昨宵清不盡今夜色增明想見清虛殿氷輪漸漸生松風傳地籟花月滿庭心記得金臺下孤樽細細斟王梅磎題玉枕峯二絶靜處翻千偈忙中認一身忽看枕峯句便作是非人向來雲影卧今日復如何不是相知少人間險處多中秋中秋添月色携酒上金臺世事無窮盡江山入句來禹廟當時計水功直為萬世利梅梁破浪歸底事成兒戲題雁山行紀當年雁來遊少憩存夜氣自從開此竒便有草鞋費示法果院僧則山深雲卧冷結屋在山椒我意如雲懶隨緣聼海潮贈仁上人百漏船是其所居塵事紛如掃僧窗對竹開欲酬清靜債一嵗五畨來天竺逢僧禮于今僧輩少學業又全䟱日莫山深處相迎有浩初明易傳故用浩初事秋魚眼詩江湖育羣魚水大隨所揀奈何世上人尋到秋魚眼寒蘆四鴻蘆葉滿沙洲鳬翁取次遊生綃才半尺占得江南秋見山真見山翠滿簷楣間屛几漫畫障意足水墨閒救婆廟二首曲徑接山阿行人說救婆須知閨室女識見已爭多海水有枯竭喬松易摧折髙名萬古存地志書英烈對酒柳絮隨風舞金沙貼地開為緣春滿眼不厭酒深杯偶成風暖輕拖練天寒皺作鞾江湖只如此今古幾消磨戲題雨後露華白風前嵐氣清秋心愁不展垂白睡難成桃花菊誰將秋菊蘂故作小桃紅輕薄隨時好飄零風雨中雪霽微雪寒侵暖新晴風掃氛天公念穡事秋稼定如雲三月十六日雪二十七日甲子晴蘇成之盛甫庚申嵗相别甲申嵗方㑹甬東憶與成之别于今草五年今朝復相見話舊竹窗前世態頻頻換君心炯炯明能言少時事滿座便風生雨中風清園蝶粉猶輕雨冷吳蠶繭未成盡說溪村年事好又添漁子笑浮生春去橫雨顚風勢轉加紅情緑意不容誇明朝春去忙如箭滿市人擕謝豹蝦浮來廟石自剡中浮來仙槎飛去訪牛郎頑石浮來立道旁能使鄉民知所敬隻雞巵酒卜豐穰梅子一株緑色未成隂千㸃微酸已沁心雨露功深人不識摘來先與了清吟今嵗朱櫻紅熟樽俎間曰有此品口占二絶積雨淋漓花頓空櫻桃滿樹漬猩紅相陪從事風流裏遙想香燈搖落中櫻桃顆顆滋春雨橙霧霏霏遡曉風出處不齊休比並一尊今夕與誰同秋後積雨起水曾舜卿朱秀文有詩用韻作俳諧體田家苦三疊秋雨霖淫數日間耳邊未聽雨聲閒傳聞農子愁無寐心願烏雲且入山戽水乾忙衣袂凉旋炊濕稻當家常連年成熟今年水誰信微隂能奪陽積雨因風驟作寒又吹濁水浸牛欄須知此去盤中飯一似鮎魚上竹難積雨後農人戽水曉夕車聲不已萬頃早禾迎秀色一天畏日耀炎光滿倉陳腐將何用細聼車聲恨最長奔牛梅花開最晚因讀墨夲坡翁和楊公濟梅花詩信筆四絶句二年孤負觀花眼少見江南第一枝細讀坡公當日句恍如玉立耿疏籬平生政坐花開早不奈顛風一夜吹緘鎖芳英春意閙轉頭青子已盈枝閘南閒地逺連天好種梅花作玉田待得開時擕酒去旁人疑是飲中仙積谷山前數種梅常年擕杖走千回而今寂寞金臺下獨對停雲把酒杯金臺中秋桂子吹香清不眠相逄還在翠屛邊一輪明月依人好兩載中秋特地圓豫官金臺兩逄中秋俱有月色內表蔡孟聲自武林試回云中秋日大雨鑑湖别島二絶坡老當年乞鑑湖君王未肯付圭符清名凛凛照人目欲倩丹青成畫圖鑑湖别島對青山山下菰蒲獵獵寒最是曉烟收未盡舂鋤閒立景尤寬東關二絶放翁詩裏想東關舟到東關雨逗寒只是當年舊山色水邊誰似白鷗閒瓦屋三間水半篙雞豚村社寄吾豪早知城市同耕鑿悔不從渠泛小舠觀三賢石夲墨妙字既因人傳者多人能纍字又如何誰知異世三君子字與名同保不磨秋葉二絶繞窗山水富清妍古木隂中隱亂蟬一葉迎秋無盡日勾萌還復待明年花木榮枯又一年誰知生意妙難傳君看亭側數株桞幾度風前吹細綿觀梅用東坡先生山字州字兩絶句韻冬深水涸未潺潺數蕚梅依翠竹間待折歸來占清賞不須移近小屛山只怕花開眼界幽香中一㸃絆人愁問渠偏向孤山好時復飄香入帝州舜廟在龍山右水來江尾難分燕山到崖頭合號龍見得人心尊萬乘片帆飛過亦朝東春日覽古四絶疏梅晼晚千年秀穠李韶華二月初試訪前溪歌舞處斷烟斜日照平蕪游人拾翠踏青歸叠叠樓臺映緑漪行到橋西多野色吳羌山下織簾祠結廬恰恰對西亭萬物昭回自賦形秋晚不妨尋好處何須送客話飄零西亭即邑西接官亭唐人有詩送客莫辭秋晚龜磎好處西關曾擕壁上鸕鷀杓來飲靈泉一掬甘却笑眼花前日誤竟煩舌本為渠參鳯鳴洞祈雨三絶山蹊屈曲費躋攀來謁仙姑氣貌閒曾與人間祈得雨姓名從此徹天顔洞口流泉清徹骨崖頭瀑布冷侵人隔凡不許纎塵入誰識中潜縱壑鱗六月官河已斷流農家無水䕃田疇我來欲問姑求雨要勝常年望有秋初秋暑氣蒸人病未蘇時吹凉雨滿庭除秋來不待梧桐報妝㸃前山景色䟱游東山國慶院院有明月堂白雲軒土人云明月白雲謝太傅所擕妓小字也此出於李白憶東山詩特紀一時景色王性之記中直言眀月白雲二堂是太傅舊跡又誤矣因成一絶以識之當年擕妓漫來遊後世薔薇句更遒明月白雲成底事誰知棋罷是深謀十八澗九磎十八澗邊遊風景蕭踈接素秋野草怕人愁有賸尚餘翠色映雙眸十年前拜四聖觀林和靖像曾有詩為士友諷誦庚辰中秋後十日重游適梅破一二蕚再書孤山山下舊祠堂詩與梅花一樣香方欲向君求剩語忽逄摘索破天荒蓴二絶春深買得一絲蓴絶勝農家碧澗芹却笑吾宗深有托自憐野鶴在雞羣逹人胸次與天寬到處浮家得細看滿碗蓴絲浮碧色不妨邀客話儒酸陳家渡至上乘院山田疊疊之字轉稚麥森森雲樣生輸與農家生計定才逄楊栁便清明宿彌陀興福院遇詩僧妙寧今宵僧院借牀眠風誤秋聲在枕邊起共詩人談雋永瀹茶新汲澗泉煎留題餘杭道明山勝因院人生行止且隨緣不到兹山十五年紫翠屛前久空濶四時轉景是風烟感秋扇五首須信此心元有性苦將濁酒破人愁舊愁未解新愁至團扇因何怯去秋人到退時須著力未退之時休向前暑中團扇多勳業一夜西風亦偶然班氏休吟團扇句退之枉賦短檠歌行藏用捨皆前定凡物逄時莫要過篋中團扇去年擕小字曾書老杜詩今日秋風風漸起要人收拾自知時潜藏酷暑又明年月缺秋孤快目前團扇此時還用事知機元要占人先村外寒食八字橋邊春水平三家村裏亦清明女郎鼓棹歸來晚却被風光賺一生春晚聞鶯村北村南花事稀晚風吹雨緑盈枝黃鸝暗與春光轉似怕騷人細作詩種松添竹口占二絶添竹栽松眼界寬四時長使翠光團參天㑹見充梁棟礙月休令作釣竿種得成時我已歸明年此際弄秋暉丁寧園叟頻澆灌要見元功無盡機次韻竹林玉老三首筆法有神緣劔舞詩壇游戲也無妨却嫌踏破鐵門限剗草堂前化鞠場我似吳牛喘月光領瘡磨鞅巧相妨何時飽聽林間笛了却官租稼滌場晚景奔忙駒過隙閙中且覓靜何妨時宜正要新聲巧賀老龍鍾莫定場獨坐破愁淺酌賢人酒覔句還尋君子花造物於豫元自厚閉門獨坐日初斜聞鵲舉頭聞鵲心偏喜的是庭闈初寄書報語加餐眠穩外只留清白替葘畬即事村烟四五水成灣拍拍鳬翁意自閒秋雨不能回衆緑洗開霜色露寒山九月朔一春多雨阻清游留得名花到暮秋偶見來禽與仙杏淡紅殘粉亦風流大龍寺荆公詩石天下蒼生望霖雨不知龍向此中蟠宰邑歸來便老成豈知詩句是心聲細看野水無人渡終勝蟠龍守此清雪中獨步家園北風掠地盡無塵惜許林園未有春小試囊中餐玉法誰為天外散花人正月晚訪梅墻隈楊桞已垂絲岸北梅花始著枝風掠晴香覔詩句容渠開晚占春時梅時往來郊外十絶舊冬全未見梅枝多是江南春訊遲今日相逢猶摘索翠濤箋上寫新詩踏雪西村探古梅一株寂寞為誰開不消絃管與彈壓自有騷翁時往來一冬多雪更多隂問訊磎梅春未深等得春來花已漫孤髙不改嵗寒心半生見梅喚作兄我詩政見梅邊清前回待欲喚曾子惜許疏蟾未弄明舊冬一篇有借得梅之清句不作等閒桃李色一聲羌笛怨驚塵偶思今嵗開花晚要醉風前爛熳春琉璃木葉櫬瓊英折得歸來照眼明聞道此花清似我莫言避俗太無情剪蠟勻脂别樣粧吐芳先與探春光為緣骨相天然好所缺江頭細細香近來疏懶任方圓參取梅花句裡禪三尺枯藤同所好斷無人似拙翁顛春已多時花漸繁勸梅未用㸃苔斑隔塵自有元規扇要見風流慶厯間磎邊小圃半荒蕪數種梅栽莫負渠香色幾年吟不盡蜂鬚先得妙工夫黃木香名花愛向春深月幻作人間黃玉花裛露承風嬌不盡好將逸語為渠誇春日二首木香堆架漸開花旁徑薔薇錦未斜風劈桞絲成亂絮輕輕飛入野人家春光到此未須歸緑替紅殘已暗圍說與羣兒休趕逐要看宛轉自然飛贉村望潮㳂江一曲水通村潮拍平沙滿舊㾗落日鎔金潮又漲水天直接海山門題睡布袋佛身廣大遍虛空收拾歸來一衲中走入睡鄉推未覺只緣認得主人翁雪後連朝風雪滿空來喜得新晴萬象回甚欲出門尋野興梅花多是旁春開題等慈寺後經略潘德鄜舊居三絶父兄師友俱鳴世培飬都緣嵗月深忍得清貧忘寵辱至今聲譽藹儒林中書當日冠天下半世浮萍無定居却是子孫能力守結茅隨分並精廬潘良貴字義榮何㮚榜第二人登科其外舅以二千貫托婺守為起宅婺守請義榮之父具問所卜其父答曰兒子方沗一第安敢以此擾鄉里請以所支金封還之義榮自是終身不治宅古來名士都如此後世虛浮類鄙之賴有晦翁髙著眼青青巨竹䕃簷楣晦菴書月林字泊楊園詩名園依水跨官塘古木扶疏圍夕陽粉蝶不來蜂又去一雙燕子話凄凉紀程十絶半夜燃萁車堰歸縣街燈火已稀微路人莫笑奔波甚領略江山暫解圍旋呼篷艇到新橋日影隨寒上桞梢烏帽䊶裙真野服又乘山轎過山腰宿霧漫山寒未開老僧笑我四番來功名遷轉都如此頗羡幽人隱澗隈百漏船東竹似椽一杯茗粥說癡禪恰如二月烏攬角村北村南童稚顛村市小兒二三月間剝桞皮捲成牛角吹而成聲名曰烏攬角云貧民逐利可憐生水附泥乾鹵漸成多得鹵成求淺利問天乞取一冬晴㳂湖水淺灘勢斜小兒并灘運魚叉風力如銛雙股冷青帘側邊是儂家秋晚曾來十日過滿田稗子緑成窠年荒只待州家榜分數攙多喜若何星移山轉度寒沙到得塍頭鼓二撾忽憶昔年斗門渡風翻浪葉櫓欹斜敲開野店旋吹燈舊酒重溫盞易氷十五年來隨分過任人呼作在家僧冬晴全未見梅花籬角黃花尚綴葩賸喜交情真耐事風流不到五侯家海際民田良田水旱不妨耕海際成田禾罕生一夜潮來留剩水民家辛苦望西成夜坐繁絃脆管挾春華都屬侯門富貴家我獨蕭然無一事清宵兀坐聽鳴蛙題旌教院僧房雲舫又名百漏船三首山僧成嵗枕雲根豈是無心直漫云更闢短窗臨澗水自題雲舫見殷勤雲片東西自在飛偶然連綴又成衣商量做雨竟何事刻畫竒峯便忘歸既名雲舫知歸宿何用多言惹是非水到渠成添百漏可憐未解箭真機桞樹滙望望孤城緑樹根平沙連屋草連雲夕陽坡上人牛小耕出羌王古印文龜子匯暝入荒山近十里茅屋人家隔溪水青燈一夜不成眠明日長征又如此始寧泉始寧花木今何在一𣲖山泉紀此清說與老僧頻整葺世間難保是虛名寺樓舒目風盡天隂分野色雁眠雲影得新晴江臺寺裡閒登覽屋繞吳山畫不成代吳兒作小至後九九詩八解一九才過二九來見人相喚䄂難開外頭天色時時轉雪急因風緩緩回三九寒威漸漸强顛風刮面怎禁當籬頭觱栗從頭響添得人愁線樣長沽酒烹魚送舊年情知四九在冬前烘來布被何曾暖身作音做彎弓宿露天今年燈市好安排雪桞香梅費剪裁嵗月匆匆臨五九太陽門戶向東開冬深生冷喜新春賦得貧窮敢怨人六九數終風扇動放些意氣走芳塵轉頭七九數過三無事閒從野老談花氣熏人能樣猛脫來布衲兩頭擔五五三三拋堶忙桞絲深處映陂塘貍奴犬子尋隂地八九春中日正長我儂閒過謝皇天只願從今大有年九九數來無可數都將犁把去耕田蘇子由冬日詩末句似聞錢重炭薪輕今年九九不難數子由時在潁州家園散策二絶山容姢麗青無盡心地寬閒樂有涯春訊不應梅占斷風流猶有海棠花散策家園日護雲靜看溪水碧生粼春光不為名花老贏得年年錦繡新宫人斜塗脂抹粉豈長妍得寵宜思辱在先萬古宫人斜上望淡烟衰草為凄然薔薇三絶多謝東風巧剪裁朱朱白白待春開偶因無事尋詩句又見沿蹊錦繡堆雨回新緑方留潤日映輕紅無盡嬌為惜江南春事好對香吹水入金焦薔薇開盡知春晚燕子閒來又曰西却恨丹青描不得旋將心事付深閨近於小圃築堂名曰秀野隔河插木芙蕖舊有詩云二十四番花信風凝脂剪翠巧妝容誰言桃李芳春後不似㳂流錦繡中再吟二絶繞堤盡種木芙蕖楊桞隂中動碧虛待得秋來花勝錦桞絲斷續怕風梳二十四番風報信名花開了便匆匆誰言造化無窮盡又報秋花第一風偶吟將花作婢那解語喚竹為奴亦浪名霧鬢雲鬟休用怨主翁先有不平鳴范園隱之立異酌貪泉直使吾名四海傳得似范公全雅志只將清白遺時賢軒亭籃輿清曉過軒亭軒外山圍未了青我意他年尋一壑只因今日眼曾經延桂堂靜看桂影上簾櫳幾度吟詩句未工從此相忘天地外主人袖手小䦨東小池小池栽得數枝蓮也占新凉七月天說道南灣納空濶盡將野意換韶妍水月泉水清月白又初秋㶁㶁山泉入澗流我已重來君解否生平厭作是非謀江下昔曾襆被宿江潯風雨欺人春未深轉盻六年重到此越山依舊隱雲心丈亭潮水衝沙未轉清急搖雙櫓似鵝鳴須㬰停櫓依荒岸草屋疏燈記夜程題懷謝驛謝公洗屐水平池笑傲東山望一時究竟後人能尚友驛名懷謝著深思偶得客舍墻根草未生市橋官桞已欣榮洪鈞造物元無意只是東風有世情偶成竹奴角簟頗相宜正是書齊寂靜時白鳥忽穿林影去自擕紈扇細題詩偶書二絶靜觀萬物各隨緣天亦何心付自然鸜鵒不材鸚鵡貴豈知鸜鵒得天年久知鳬短鶴長語誰賦花榮竹脆詩物理無窮難測識且傾美酒樂天時偶題夜深水冷無香餌若箇黃鱗肯上鈎我欲釣鼇安爾用一竿風月好回舟題司馬才叔詩後司馬才名世所賢銀鈎珠唾尚依然塵埃試看蛛絲壁倒指於今六十年六言梅長官深有味越人以楊梅為梅長官木居士喜清遊未用三熏三沐且占一壑一邱色惟有用文子翠亦堪餐此君未須歌南浦雨終是望渭北雲
