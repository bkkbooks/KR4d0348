body:
  text: 張氏拙軒集卷一宋張侃撰詩積雨嘆去年南蘭陵官河無流澌隂雲久不見萬里行炎曦太守為民禱百拜躬愈祗忽然動涼飈驟雨肆奔馳旱苗有生意下民免寒飢感格在俄頃嗟人自不為頌語我欲作垂世同曹規深恐旁觀者憑藉立是非反謂地勢隆水散及四支縱使雨入尺立待只片時今年芒種後有雨細如絲農家買五兆寸波成漣漪我耳曾聽得把筆紀小詩又傳練湖圮澒洞南北迷浸淫到旁邑原隰不分畸秋中月色皎老晴頗相宜深谷傳地籟喬松難扶持滂流盡三日處處同一辭化工有至理淺眼休蠡窺蝝蝝可憐生短衣到鳧茈冬寒與夏暑平日何怨咨一旦示災咎反己深思惟退寸望求尺籥合規微資豐艱非逆料人情恣生疑既欣堆如櫛復話禾無䅑遂致隂陽轉未免水旱移固窮不羡冨求足翻成虧不知尼父言三年積銖錙一稃與二米猶勝粳核肥農家多守分冨家當坦夷秋後一日書所見者秋深山轉清雨定水自緑庭前牽牛花粲粲悅人目居官己年餘竟日書吏牘因間窺化工景象不一足促織汝何為懶婦絲斷續夜長清未眠題詩燒短燭紅塔詩出門看青山天際晴雲合虬松植長塗亭亭兩紅塔誰知百年後竟坐市塵雜老僧隨世機電眸閲伏臘流水洗不盡就下汙流納北窗稍幽虛清風滿眠榻觀海孔聖道不行乘桴浮于海非子深寓言誠欲警不逮我生遊江湖汛舟聽自在有時月初生滿天雲去靉今朝到海邊潮遲立可待固知源脈長下藏魚龍隊想見景晴明間亦露光彩因爾觀自然天地能主宰雨今日天欲雨農家名分龍雨意或羞澀霑潤限西東入夏雨己多頗覺支體慵輕煙苒苒緑夕照微微紅不奈勃姑語呼雨雲滿空乍晴絲捲軸復暗花無蹤良辰偶弧負土脈方豐融屈指是新秋細聽鄰杵舂冬夜對月秋來月漸清老火猶未退好風送新涼雲深復昏晦徐思此夜滿豈不令人愛暑氣薄前榮蒸溽肯少貸月色到芳池緣此亦拘礙今宵坐中庭揮塵成獨對霜華雜月色頓然清病肺何必泥中秋此語吾永佩午步積谷山探梅才有一二蘂爛雨才放晴街頭泥三寸支笻積谷山寒梅微弄粉二十四畨風草四風梅居首楝花居末迎臘先一訊青女素精明竟不易號令譬如蛻骨仙色粧而意整惟有吟詩翁年年來管領發奔牛紅添花滿溪緑帶草穿石佳致在目前逺近記經厯雲疏雨漸收篙長水倒激平生一詩卷未免寫胸臆記得坡翁言在郡六百日出處雖不同我性聊自適桃花鸂鷘畫工天機高腕有萬鈞力把筆解寫生妙處欠人識地深煙自引雲斂望不極誰知只尺間卷藏棲座側桃枝糝淺紅羞帶燕支色經時歎芳跗數片墮晴碧政緣景色饒詎忍光隂擲波心自在流夕照苦見逼雌蜂不受影容此雙鸂鷘睨目且裴回暫收西去翼籠寬終難馴水滿好修飾旁人莫癡心乘勢事箭弋庶幾久相忘飛浮欣得得連旬暑送風對此融胸臆不必形似求枉費半圭墨新河侵晨發金臺停午泊新河風定雨新霽一段平青羅逺煙搴新景宿鷺行細莎臨流洗塵心此地今幾過官事記蒲鞭少駐聽漁歌大哉濬汲功萬古保不磨晨起青山與白水足以娛人思麗花與佳禽足以令人悲因思世上事感觸特一時拘拘守定見年少紛白絲朝來北窗邊天清雲不飛桂樹充緑潤其色光陸離靜坐息萬慮手攜淵明詩飲酒得真趣神氣常自怡我飲僅涓滴螺杯謾爾持後山草木深有禽擇所栖婆餅為誰焦姑惡為誰咨騷翁繹楚語解説纍千辭萬物雖異性天地同一機時至乃飛鳴人訛反生疑禽語空啾唧有怨難窮推好生毛羽者細聽強誑欺遂使本然質由是深有虧清風到階庭處處禽語奇勿問聲如何天地何曾私杜門詩初官金臺邊日長頗間暇細賡飲酒詩喜無俗子駕雲輕月緩梳竹少花相亞官塘頗塵囂數間名傳舍吾身聊自適閲世如啖蔗春初汛舟回晴溪山影射蒼苔護魚池粉牆旁花架東風知人情遊絲從空下厯覽佳有餘頃刻在所化杜門觀我心陶冶有鮑謝府治闢鎮越堂得坡翁詩石於草棘間功名蚊成雷文華珠媚川作意每中輟要當付自然誰知蠅頭表不似詩句傳鑑湖生光彩坡翁真謫仙記野人語野人延我坐古木隂四垂未語涕先集昔盛今全衰我聞野人語斯事古有之但要存心地何須問墓師歸來五首小圃近吾廬呼奴掃階曲梅株晚放花溪水新圍玉聲名不厭低出處今已熟倚杖看城山飛來兩鴝鵒西關景色妍歸來春未盡岸淺栁生隂風緩花成陳歡娛垂白親免得望家訊乳燕立簾鈎別久還相認薔薇在其西老桂在其東先後不同時生育歸元功幽艷占淑景清香待秋風有句莫漫與騷然固長窮爽氣滿清晨秀色藏山骨結亭苕水旁斷手建巳月古語敬書紳高談休拄笏柴扉喜常關從今避請謁酴醿數尺長伐木成小架玉色映晚春濃隂接初夏濁醪任淺深細草堪枕藉興來信步行浮雲出山罅書目所見者五首我家屏圍圖畫作江天雪雪晴行漁舟蒲帆繫檣絶猶記為兒時劍立從頭説今日親見之甚欲伴清潔淺灘潮未到小舟不得動當時一羽輕今成千鈞重老翁倚篙竿生寒肩勢竦勸翁且歸家潮來勝乘槎盟鷗何處來聲和春喜近賓鴻可憐生呼羣摩霧隱鷗鴻本何心世人無義襟責彼不責己嗟嗟非獨今羣山恰四圍江潮遊其中潮低不成山豈是厄於風舟行山漸逺潮勢同瓴建抑之可使高又作望崖反小民海濱居煎水活妻孥指海充府庫何曾計有無鹽成有喜色摘蔬供午食君子勞於心我儂勞於力朱陳嫁娶圖生男願封侯嫁女在比鄰此是古人言最知天理真世逺人亦偽嫁娶來城闉嵗序罕聚首浩渺不計春當其出門時錯落車百輪笙簫填孔道珠翠委泥塵堂開牡丹屏盤橫水精鱗徒取眼前冨未問身後貧女嬌鮮禮法薄夫貽所親民家女及嫁擇對走踆踆一旦有其家昕昏如主賓誰圖朱陳村宜為堯舜民嘉定壬午春晚園官送杞菊因取陸天隨蘇東坡張南軒三賦誦之感事賦詩我志甘淡薄不為物所遷園官送杞菊秀色滿目前生育秉至性隂陽順中權可憐黃口兒匕筯照腥羶縱得一餉戲旁觀成脅肩杞菊付中厨試著薑鹽煎至哉天下味妙處祕不傳三賢留雋語首當師之焉秋日間居十首歸來清淨居懶踏紅紫陌有堂新翼然逺景疑界畫暑氣礙秋容似覺眼界窄墨雲吹雨絲頃刻入地尺水勢沄沄來岸流己拍拍老楊溼根翠稚菱汙花白東港與西塍了不見舊迹隂陽反掌間底事作災厄名花逢深春各自逞嬌怪薔薇繞籬根園丁采去賣瑣細不知名結束擔頭挂細細隨輕風時時與破壞詩人浪自吟放言竟成躗紅紫一夕空又見韶華邁亭亭珊瑚秓懶入名花𣲖每見天秋涼依竹堪入畫我志甘鋤園汲水敢言倦擬種百尺松終宵風雨戰土脈分瘠肥秉性有後先蔚然三寸長荆棘從旁罥待得成清隂方為世人羡畫手知姓誰拂拭好東絹寫此嵗寒姿爽氣滿庭院不記少小時插株泥樣賤秋崖一段清秋水暗生池眼力所盡處不特宋玉悲化工爾許巧間花糝枯枝涼生細細吐月緩重重垂但恨古之人未能鑄好辭從叟悲秋語如石不可移獨愛白樂天酌酒細吟詩漸喜無人聽格外只自知西關近邑郛間地素來廣規度三五弓栽花屹相向第一覔竹本宗生要易暀晚色翠四圍依約見秋嶂老雞先司晨除柵試一放峨冠汙枯草鮮明莫能狀厨人出新巧收勳到盆盎持送文園翁小字書佳况江南多澤國別𣲖亦成湖渺渺明佳景紛紛展畫圖層穹邈無際浮翠前峰孤欲喚扁舟去筆牀茶竈俱東邊嶼深幽稚蘆不記株花輕相上下隨風掠酒盂湖中開一鏡中有雙野鳧可憐知者少此趣未嘗無人情易愛憎品花語最嚴遮護冨貴花排日挂牙籖驕態不自持霏微花上霑虛名竟何益餘事付寶奩花開有遲速稟氣等洪纎到眼俱可玩何曾形棄嫌幽幽牽牛開碧色照疏櫩勿云此花陋所取緣傷廉迎秋花事稀蝶翅依沙晚籬落繞紅園暗遣佳名損立名豈願醜一定不容返寧避市塵喧甘作山林遁柔枝綴鳯兒欄外成錦幰婉婉風味殊苒苒煙光逺治世鳯朝陽吾道何須偃毋學接輿狂終日空思忖蘭以深而香避世非吾忍移根植堂下遂使世人囅誰知秋華拆未許流聲盡即之色漸溫佩之芳愈敏因觀太古音試理幽蘭引幽蘭本香草名隨四時泯奈何楚子孫些只徒自窘一枝三四葉與人作標準蘭芷荃蕙本是一種香草名隨四時改焉不特春有蘭秋有蘭春有蕙秋有蕙也小園雖逼仄堂成春告殘羣山當目前翠色煙中繁隔隄多垂楊紛紛風前翻畦夫為豫言宜插秋牡丹既無傾城艷亦可酒筵看根株雖脆弱千葉攢中單夕陽媚晴水紅濕回輕瀾休從殷七七染法成欺暪五雲門外湖田詩越中官賦重有田即追呼小民生計薄何以存妻孥前賢念民切瀦水啓鑑湖自此嵗常登不計大有書湖堙水漸涸往往事耕鋤禾根雖浸水天秋翠平鋪后王主生育詎肯餒一夫盡説湖田好大勝行商車商車利縱博巨濤與險塗湖田若不熟明年豈全無娥江市前回渡娥江夜半呼舟行今回渡娥江風迎晚潮平人心險於潮潮頭平於路娥心無古今潮隨漁篙渡千秋觀拜賀知章像天清雲捲幔風定水開奩既知鑑湖濶所取胡乃亷一曲期自足千年名字馥我來拜遺像端可激頽俗遊石筍偶成石筍遊山色浸雲表兩輪天地濶一覽江湖小渴飲金沙泉飢餐翠松苗鄴公何許人遙想好風標郊外縣市巳蕭疏何况在西郊浮雲不成山濁雨平淺坳紛紛占生殖蓋頭一把茅釣魚尋竹枝明火采松梢翻成水墨畫極意竟難描移時反官舍遊僧初解包潛思目所寓肯把聲名拋試問耳聾許終勝掉頭巢間意秋來才幾日得雨洗暑氣庭前容人行瑣細開野卉似覺氣象殊鄙薄牡丹貴不是怨春風政緣出處異柔得千年存剛則片時易彈指秋又深靜處覷萬彚胡床倚竹根清入詩人胃好風緩緩來側耳聽絡緯樊將軍廟在上陌樊宅土人相傳是將軍故居史本傳云沛人也五十年前因題數語今輒附此將軍生沛邑樊宅在吳墟既沒其先語決知非此居排門忠尚在浮甲事尤虛却恐同姓者相傳佚本初古澗間適雨來澗水碧澗逺山勢斜澗邊隨意坐瑣細覔開花野蝶深有情翾翾依沙晚以渠流水心醒我觀花眼示韋中實六首鶴隱乍來時年方三十七忽忽十七年終始如一日卜居在邑西近我讀書室間來劇笑談友情似膠漆筆端備六體紙上春蛇逸兩鬢吹秋絲吟詩紀經厯去年金臺歸今年三十六守拙伴林鳩折箭存飛鵠小園接屋東有堂依水緑浮雲前山來蕭放忌拘束雲已久無心細看猶未足起來一杯酒從此覔歸宿我與鶴隱交一紀又踰五燕飛知春秋雞鳴便風雨惟君勝蘇端許我似杜甫忌情更忘言握手見肺腑君或醉時歌不問歌差誤醒後頗快人續續寫詩句向來未服役君室日清間侵曉披衣見中宵曳杖還溪梅粲玉蕚幾度開笑顔邇來君纍重旬月旅長安葛屨踏塵沙春在湖山間忙裏買小艇何妨卧看山一春隨意行濟勝欣有遇不愁風薄人但愁雨深阻亂山煙中藏勃姑聲轉嗉春無三日晴前人句己寓惜許好花枝爛熳少人顧君久不在家花思依栁絮微官當力勤後月已戒路思君且話言處處放間步花前借鶯吟卷中笑魚蠧民家老樹根小憩覔幽趣更後四十年同君尋舊寓斯事姑置之尺書寄飛羽示高愷叔天秋桂子香我舟從西來愛君丰度好面上無塵埃相逢各草草未暇開情抱贈君以一言功名薄穹昊新春雪初晴記水三四程徘徊梅花樹邀我了詩情題李伯時馬近代李伯時能畫天廏馬畫本出心匠不在韓幹下真骨獨當御汗血沫凝赭為渠生光輝神妙非力假平日熟意態繪事頗間暇誰知贋易真萬馬悉喑啞色帶碧雲騢馬名梅聖俞都官有碧雲騢集和鸞亦雅雅一筆竟不豫此意識者寡三高祠武侯出師表子陵釣魚磯達則濟天下窮則斂所施凄涼數間屋荒草碧離離功名挂人口毁譽復隨之檥舟三高堂快讀石湖碑不有君子生何以立國基夫君守定見遁野身自肥儻不為時用猶當師仲尼血指恐及己旁觀付盛衰泛湖誠偽計思鱸設虛辭區區務力作反蒙樵人譏松江水不窮那能洗瑕疵石湖擬小山三招何逶迤字字春秋筆史氏當憑依武林有西湖湖上水仙祠君復隱孤山清名敵伯夷死無封禪書小詩揚京師坡翁刺是邦寒泉薦江蘺在郡六百日遂踵居易規終焉配水仙事定分是非邦人思坡翁要和甘棠時遂肖三賢像相與祝其尸三賢得其操三高得其微篙師催我行日落江水湄惠山勝槩棄道旁翠色空蕭爽泉經古澗流鳥趂枯藤上俗眼眩浮華紅妝圍翠幌入山恐太深更肯契心賞山靈亦退聽佳名慮標榜斷綆汲寒深隨人墮世網煎茶詩結廬枕石隙其下通泉脈新開數尺泉涌然如乳白道人北山來間話到終夕徐云茶已芽氣味及髙格絳囊映緑色未嘗齒流液汲泉滿歙缶篝火勿遽迫須臾蟹眼生茶新手緩擲薑鹽宜屏除秪能添水厄一作薑鹽亟屏除莫令添水厄東西家東家機杼鳴西家舂杵急西家荷艷鮮東家竹翠濕小小了生涯四壁從渠立昨朝雨傾盆雞柵又新葺柘葉延涼隂父母妻兒集村南沽酒歸佳饌有魚入對鏡辭古人對鏡辭率是年紀老出言反成悲未免耿成抱間有少年人對鏡默祈禱第一早功名第二多壽考第三欲富貴滿屋貯珠寶此心機械生此身晨夕惱用一每藏九終焉乖至道目為守錢虜名字亦可保不見王夷甫舉去忘稽考我今對鏡別有酒便為好欲醉未醉間浩歌出晴昊荷花解人心風前互傾倒秋夜秋深氣轉清夜間更正永庭前菊半花天外雲收景試呼麴生來緑色照瓦皿悠然兩相忘何必問形影十月二十四夜雪霰用蘇文忠和趙虢令韻營居在西關鍊句誰能和水深舟巳行雨驟雲無奈殘花蝶倦棲弱桞鳥驚墮橋杆挂稻頭小定事舂簸帶濕芒盡除易破粒漸瑳世路久羊腸人情隨蟻磨每祈天雨寶非是心好貨力行母自畫浮言空相挫因間到農家暫憩同客坐別港野鳧歸斷籬瘠牛卧老翁語殷勤今嵗多坎坷望晴眼力枯護田衣袂涴政恐官稅虧不顧茅屋破老翁勿預愁太守兼勸課丘明紀大飢孟子憫人餓瑞花舞綏綏來秋真可賀戊辰春二月雪吕君國秀曽賦七字句豫和云試來月下逢仙子何似風前聘宓妃乙酉春二月一日雪再吟二首去年正月尾雲片綴雨絲今年二月頭雪花一尺圍豐登有定數元化孰可窺呼奴粲燈篝細誦辛卯詩吕君年八十曽賦春雪詩平生慕韓愈大書萬玉妃我時年甫冠辛苦鑄好辭功業只爾耳嵗序空推移孤山先生聲名髙引人同吾道來訪孤山師草木冨華藻有泉出山罅碧色巧縈抱甚欲酌此清仰天應笑倒寫古五首事行人所難塗人未深信吾身一時髙佳名萬古振堂前頗幽虛老竹添翠潤世俗日澆訛風流今已盡文章如元氣又如水赴川宿習務洗去仲塗當日賢扶持正統在後學承其傳衆目不可掩璣衡麗青天束帶立朝廷平日有定力挺挺道鄉公面上無佞色諌書與天通那暇顧荆棘墓祭記學宫賢哉太守職人心具天性嗜好各不同荒涼陸子祠寒泉引碧筒名者身之纍千載存遺蹤獨有吟詩人時來繫短篷希聲少年日徑風盤青蒼與世既不偶投老頥山旁藝花靜天理濬泉發新芳斯事古亦有君子戒反常清寒臞叟久不出短帽半離披天公有新事剪雪玉參差仰瞻銀海眩須臾肆寒威試呼緘口翁酒器名時復一中之初如薝蔔飄終似白練馳隂氣無所泄乘風舞綏綏山明失紫翠手板休拄頥磎流有層氷艇子寸步移寒禽集深條可憐翅翎垂擁爐回陽春始覺溫四肢我生僅再見老農重嗟咨錦里杜子美姑溪周紫芝文章江漢流初不事支辭遺編可推究古豈異今時無此雪與寒何翅五吟詩宜瑞不患寡寫檄誅雲師杜云太古以來無此雪周云太古以來無此寒王龜齡洪景盧有五白倡酬書事細雨飢寒色忽被北風吹楊栁絲不長免得成別離西家杼錦繡東家粥文辭天地本無巧人世嗟何為今年氣候遲五月寒尚在花栁己稀踈軒窗頗瀟灑提攜一書篋轉盻十五載自拂蛛蝥去文字生光彩名起致人嫌俗冗令我凂袖手細旁觀小大立可待樵夫唱竹枝漁人歌欸乃清適付儻來浪語免後悔吾家儒代耕官卑謹勤怠入夜傾碧香聊用澆磊塊嵗時書事官居盡日間隨意自消遣出門河水清風定回長練煙林入畫圖脫葉霜新絇景色為人妍一嵗知幾變因思天地間是處堪留戀指隨襟袖寒地氣近淮甸歸來吹青燈峨冠看經傳今人聊復爾古人不可見牆東古楊樹秋來已憔悴非無嵗寒心政以枝條脆陽春敷新榮生育不擇地依依楊栁枝風前舞嬌翠嬌翠雖至柔中有生生意夜長何漫漫誰為勞者辭致身清明朝誰為感遇詩古來賢達士氣志不肯卑曳裾非素習不過祈人知一言偶相契遂踵蕭何規嗚呼今不然車馬日以馳朱門極冨貴長途多寒飢立身榮辱中每見無不為平生毅然節反為今所虧赧顔度朝夕同隊如小兒結茅枕吳羌清名萬代垂束髮能綴文未解知其奧修綆汲淵源所得是潢潦年來三折肱逢人漫稱好古意愈簡淡新説恣顛倒如何十日曝只望隂雨膏閉門覷天功時至學自到霜色白皚皚與雪竟無間不獨齊國人凌晨歌甕飯古瓦燦奇葩纎微分六瓣雲寒曉不開雍雍有孤鴈猶記前十年躡舄青螺綰舒徐酌細泉委折登危棧獨恨來倉卒野服未易辦去年買小舟斂板作微宦荒涼屋數椽門外多車輚旋呼市居人粗葺如縫綻寂坐冬夜深霜風吹兩骭舊書不敢廢官事不敢慢達哉漆園翁出處任鵬鷃朝來瑞花飛簷前成箇箇老農村中居沽酒自相賀不願擔石儲但願免飢餓連年田有秋牆東添石磑春來亦有花竹外江梅破倡桃與妖李臨風自嬌惰上天新賜瑞莫測花機大毫端己先知浩歌續楚些冬雪己飛舞冬月愈明皎午夜靜人籟一目天未了荒村木杈丫上有烏鵲繞胡床擁破裘呼奴取青醥良夜天下同妙處識者少何必與人言壯志出塵表前朝到閘南氷開春意動寒風先觱發日色尚曈曨老翁禮頗恭側立手先拱殷勤謝官儂筠籠野果重顧我守官下仁惠愧劉寵其位逼而卑惟知短檄捧舉袖謝老翁母以斯言恐我見誠暖姝我才甘散冗心官素坦夷幼荷父兄詔口誦太古篇煙村雜漁釣誰知賢者樂竟坐旁人譙偶有百鍊銅鑄作架上照形模雖不同小大亦相肖一為世所移作事非素料酒中有妙理勿學淵明笑淵明曠蕩人行藏同荷篠天外有奇趣勿學孫登嘯孫登隱逸輩施為異常調萬事付自然吾方詣至妙嵗晚星回天雪晴雨收腳畦丁昨夜來老竹如新斫我本一書生紙上守糟粕治圃非素長方欲求其略吁嗟天下人方以鄰為壑人心自爾殊化工無厚薄羣花極妖麗不似梅花清孤標年年在吟意年年生香清到詩骨可玩不可名安得李杜輩美酒為之傾食圓用建昌使君叔父韻荆楚遺風在瑣碎陳佳筵猶憶總丱時兀坐空自憐老妻劑秫粉夜永燈花偏瀲碗蔗漿穠晴雲繞目前翻匙玉比潔膠齒珠相駢我髮日種種流光自年年門無送酒人古詩云上元應送酒來自蔡經家誰能中聖賢因試囊中術妙處有機權由來寓于手不在刀削圓泛觀天地間幾者物之先大阮精詩學詠物巧回旋虛名付儻來默守終日乾吳生泥於方所見何拘攣三復叔兮什華池水潤咽吳伯愷食圓詩云平生五千卷為方不為圓池荷水淺荷亭亭風過半欹側入水元不濡須臾見本色偶然成珠璣至妙人孰測乍散起微波再圓聊作劇瀾雨未舒晴浮雲時擁墨小池瀰舊痕一旦寓新飾荷平録水深翠滿真堪惜切勿濺成珠漾去靜如拭楓橋牆邊紫燕留栁外紅日晚川明山影動風緩波聲逺吾道付悠悠世塵空衮衮精廬傍官河時有舟車返古賢用志苦吟詩一字穩乃知半夜鐘絶勝木蘭飯木蘭揚州石塔寺舊名
