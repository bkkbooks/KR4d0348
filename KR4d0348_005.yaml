body:
  text: 張氏拙軒集卷五宋張侃撰賦劄子書序跋借軒賦彼美人之容止兮詹姿儀之端潤郤萬邪而不御兮秉心本而為凖囿宇宙為一府兮揮是非於一刃聲名如浮雲兮提養生之四印蓋嘗商𣙜竒譎特其遊戲不根蒂於嵗時而墮賤𨽻之計乃餐明月揖清風踐羊豕之隧而入幽人之宫爰觸感諭在亡有中笑藝藝之各役杳不知其所終藏須彌於一粒絢瑞彩於青穹引之則俯用之則仰譬呼吸於寸景易有同於反掌繹折楊於皇荂猶及見乎古唱吾不知一身之適而强名曰借豈非俟萬物陶冶耶腐臭為神竒耶靈府清冷耶笑傲塵表而不視耶計楮中之分絫耶蛾緑粉白之麗耶不然其借也非南非北非東非西胡然而安亦胡然而歸耶吾曾體性抱神以遊世俗莫不有機械必有機事有機事必有機心機心所存而咎膠舟於坳堂之水不深是借又委之無可奈何子陵之釣志和之蓑甫里之耕商山之歌當其未得孰不哂夫退縮及其欣於所遇而視之已多吁青黃豈木之病圭璋豈玉之福蝸豈在鬪鳬豈在續惟人心因是而揉局之耳若乃日月左右天之明兮河瀆小大地之經兮花木妖麗春之榮兮雪霜嚴肅冬之刑兮至於腐草化螢光何燭兮汚水為蚋飛何速兮蜂呪蜾螺本何親兮雀投而蛤果何分兮槖籥紛冗互變易兮肖形班象終不一兮孰測其狀孰標其名氣類秀育區别以生既不諳其所來又託之於秋聲嗟夫架木為楹疏土為池醴泉千斛摘茶一旗入則繩樞出則扶藜竹有晚節梅有清姿水能容量山能呈儀自得膜外之樂不染世間之絲佩玉鎗鎗印綬纍纍孰若一飽以佚代危刑賞之用鞭朴之施孰若䄂手以隨四時然則吾之借非朝得而暮失初順而後抑者也借文以傳其意借詩以騁其神既沃潤乎肺腑而不勞乎斧斤與鳴則鳴與寂則寂縱其百來付之一息方將如禦寇之行風莊生之夢蝶一箋天公百拜僣躐試抒借之義而為子作一竒特事石首魚賦江南有魚冠冕鯉魴豐上鋭下金玉其相魚之初來隨波低昻導自東海游乎長江什什伍伍前不可當或抑其勢摧櫓敗檣小立待定拾塊盈箱凡物之生其生不窮因是而見天地全功且夫魚水類也秋化為雀冬化為鳬又不止於一生二或云魚首有石厥狀碁子為鳬之首石亦相似既不同胞又不同體雀入水而成蛤蜂祝蟲而類已信物理之循環吾有感而賦此春風賦余尚友古哲兮何者為是何者為非非不可以反兮愆一已以莫追刓精神而役四體兮如橘中之蠧寧淡泊山林之表兮聲華掩匿而未露天地同爐兮日月同車河瀆同源兮性命同根伊萬象班形兮又同是昕昏春榮而秋颯兮吾又聽化工之所即豈羣囂之踽凉兮吾獨示之以默造化無私兮粲者千百物之不齊兮賦有厚薄雲噓而成氣兮雨結而成雹融神於不可測度兮窅然無鄰嵗㑹而月孟陬兮萌者拆而勾者伸靜觀品類兮自形自色墮我其間兮欣然自得彼風馬牛不相及兮制命有職揖飛鶴以來前兮將游仙而自適豈曰豫而未厯石竹花賦伊夏之始繁隂在圃風清日淡支笻緩步有花瑣細山陀依附愛玩再四精神姱嫮不逐羣芳低昻取妒如髙人逸士所守有素不然名章俊論摹擬窮狀而此獨不預蓋嘗觀涪翁水仙之辭廣平梅花之賦竟垂千載之名其肯與草枿而同腐薔薇荆棘而滿林巴且擁腫而礙路彼自生而自悴又無從而告訴天地之間物各有主其果無知隨世而住豈所賦之不齊反在人之取豫又嘗即是而觀陶朱泛舟嚴光持釣傲睨一世潛易其號名不虛得亦各有兆茍有遇焉庶極其妙吾當探機緘而叩此花之速肖彼天隨生默寓譏誚比方居下不足以詔噫花之遇有時而吾因是而反照夏喜雨賦張子病暑無以滌炎酷效六一翁賦之今得一雨嫩凉入骨向者日之虐今為雨之賜其賦曰張子丙午之晝有雨徐來清我神舍其聲大而豪其勢上而下以為絲又無機以為箭又無靶初焉而衮衮少焉而灑灑既空階之亂滴復斜漏而猛㵼恍而驚曰是何異歟召巫咸卦之遇坎之解曰彌天必降彼其濊者歟危虛直日彼其㑹者歟寶珠雜色彼其具者歟今日之瑞不疾不徐紛紛乎屋山之捲茒蓋瀝瀝乎嶺腹之搖松株使饒爽塏不亦快乎是能納傭叟於清凉之區脫傭叟於炎酷之墟能釋其倦局之軀放蕩於不謭謭拘拘乎言未既有東南而至者飄飄若回雪之入太虛來於綺疏俯而謁之封其姓姨其字也張子解帶而揖之曰其爽籟之裔耶抑獵蕙之系耶楚臺揚腐之餘緻溪谷土囊之竒異耶小之蕭蕭拂拂之態大之切切激激之類尚與汝忘情乎胸襟之外耶於是延以佳賔酌以醲醇微天際之故人誰能滌我之世塵賔復飲我形骸爾汝忽乎月皎星稀之不知又焉知黑蜧之墐户商羊之起舞歸賦此邦不可以游兮吾將安歸道卷藏兮曰時之宜樂天知命吾何憂也飲水曲肱又何尤也彼其之子好是謀也三月無君不如丘也子豈好辨哉豫不得已也隱凡而卧是有俟也王庶幾改之言之輔也遲遲其行非濡滯也三宿出晝豈舍之去也君不吾留浩然有歸志也歸乎歸乎踽踽凉凉巧言令色也懷寶迷邦國之賊也我心傷悲兮日月于邁兮覬王之改兮萬民永賴兮一變而魯再變而道嗟乎不仁蒼蒼穹昊上齊倉論白馬湖土劄子某竊詳白馬湖係上虞餘姚兩縣溉田植利湖之南邊别有一湖名曰夏蓋淳熙中創置北岸斗門二所尚存支流蓋白馬地勢稍髙夏蓋地勢就下支流相接步畝最多夏蓋又管三十六所水溝正𨽻兩縣民田非夏蓋之水不足以沾濡夏蓋非白馬之水不足以旁及是以兩縣人戶水利所爭必并白馬而言之漁蒲湖即白馬異名也上虞陂湖昔之為田者一十四所管米四千餘斛夏蓋乃居其半今若再許人戶承佃則是抱納之家不被水利重圍之田未免起催縱不起催計田若干遞年樁管修築海塘坍損去處顧亦可行既是修塘久例可照若從此請租入反添無補事功徒為民害止因頑民冒法相其浮土插以桞枝少俟沃茂映帶左右因而成田更相倣效利歸於已稅不輸官交論互陳至今未已向使湖可成田不當既成而復廢儲米修塘不當既廢而方舉朝省畫降使臺榜示憲司公據皆所以立國家根夲之道為民間經久之計也二卿陳公謂府帥夕郎傅公曰曩嵗越境大旱􅌘縣諸暨赤地數百里獨上虞大熟餘姚次之又以其餘及旁邑觀此則白馬夏蓋兩湖瀦水驗矣前人創置斗門規模甚逺斗門兩邊岸石尚固精加修治閘板啓閉水勢瀰漫日漸月漬自難耕墾或遇旱沴只依古規兩縣人戶先後灌溉其閘門扄鎖乞照本縣西溪湖例仍嚴立罪賞俾頑民知所畏避不敢再犯庶幾湖不成田人無爭勢兩縣䝉惠豈淺淺哉某負丞數月推䆒弊端輒陳一得之愚仰玷髙明之聽倘辱採擇見之施行不勝幸甚伏候台㫖先是餘姚縣人戶狀乞上件湖土充海隄倉上譙大卿令憲書某竊聞之古之學者必求鄉先生以礲其質而就加良友焉嗚呼此道之不傳久矣獨韓退之以身任其事遂作師說且引古之學者必有師師者所以傳道授業解惑桞子厚一見其說詆詈謾罵直曰韓子好為人師是雖揉於時尚狥於流末凉凉踽踽之輩行行孑孑之人百伍為羣同工異曲翕翕成風故退之之言不得伸而子厚未免逐臭矣雖嵗晚只此數十篇以發泄平日憤憤之氣卒於無所成就故師不可不審而學不可不謹也然則子厚縱華其文髙其標痛自刮磨洗刷之終不可以救藥子厚固不足數而師友淵源之論持守根株視為暖姝如劉長卿所謂文章與時髙下僅有口耳之習而不知左右之自得例以為常談不肯為吾儒事業一伸其眉者則相與挽回於唐虞三代之上都俞唯諾作成雅頌以和其隂陽而潛回其氣光其日月而大明於天猶賴退之述元和聖德詩鼓吹六經越裳之操南山之什雖烏有亡是再執筆以偹指呼蓋有不得而吐其喙如子厚貞符之論鐃歌之曲艱深漫漶抒虛無不根之文以惑主聽申不敢動怨懟之語以覬天回豈非師不審而學不勤歟其與退之師說所以規矩後人而俾之必循其道上可以事君下可以律身而謂位卑則近羞官盛則近諛聞道有先後術業有專攻而聖賢相逢治具畢張拔去凶邪登崇俊良互見於文字言語之間者皆所以持擇而為士君子之歸者有間矣某賦豫甚嗇而造物之所畀者又甚吝每竊謂退之子厚出處與夫古者必求其師端則正否則邪如斯之從况耳之友餘一旦濡濕相沫為生育計及志營道行不惟不如師友素定之見猶且睢盱眦睚矛盾之相捔相攻肩袂之相攘相奮而若是然也嗚呼此某之所以三嘆世道之不古師友之不正而有以成後日之弊嘗以是說質諸當世君子往往許之某不敢必其說復有俟於英明卓犖之人耳某甲戌夏始獲一拜道德之光潄芳潤而醒枯株挹薰沐而溫寒谷不間晚後且俾以鑿度龍圖師春三書使知天地捭闔之機筮卜協從之本雖未能敬承下風北面師之覬其所得與昔何啻徑庭方欲繼請而閣下司刑江東一道正民生不聊賴時含餔而飼之辦藥而安之推惻隱之仁而納諸春風和氣千里安堵聖天子思舊人而若理不止江東一道將見天下皆䝉其福閣下退然以功名為浮雲以富貴如嗜炭瑩然心腑略不少動又豈非學力天機到而足以為人師耶今一邱一壑足以逍遙物我喜悅情性闖尼父之菁華尚友千載以竟其事某縱不能亦猶坎井之蛙蒿艾之鷃自下而上尚有望閣下出一手之力而置之清泠之淵庶幾他日得遵退之求師之說而無為子厚附麗不端則某之幸也多矣某不自知僣謹繕寫古律五十篇雜文十五篇分二冊敬置氷几敢乞熏仁少賜眄睞非敢自齒文士之列萬一可以收拭庶克翹肖耳某嘗怪朝補之作離騷新序謂王道衰而變風變雅作其後離騷止乎禮義故太史談曰國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣朝又云自風雅變而為離騷至離騷變而為賦其後復變而為詩又變而為雜言長謡問對銘贊操引茍類出於楚人而小變者雖百世可知某今所獻雖不敢倣此然作文大要皆自流徂源其龜䝉之叢書日休之文藪要亦得是意耳進見之再又畢是語以幸閣下之裁擇代大兄謝樓監丞為先君作行實書某伏奉台翰仰佩勤劬之意何以克當日者不自揆輒以先公平昔行事求名筆而顯揚之退惟人子之道盡制三年復齒人列此心猶不遑安於心者無踰此耳昔蘇內翰求之張文定朝太史求之黃涪翁以蘇之聲名朝之文華自為家傳可也然且求當世英偉人謂不如是則名不彰名不彰則傳不逺傳不逺則殆非孝子慈孫之心也必請於人請不獲必再請再請不獲必百請千請而後已今一請而得之拜起莊誦涕泣交集載念先公訏謨兩社出董戎師始者惟主於和以靖家國初非持兩可之言或者不之察極力毁詆獨丞相錢公侍郎徐公為之辨白已賴天子仁聖灼見初心不加之罪使歸老田里盡其餘生而先公每以手加額謂無以報天子今其已矣而言猶在也向也錢公徐公雪其事今也寺丞狀其事存歿被賜則某所謂謝又非止蘇朝之於張黃也不宣某頓首再拜自序䢴城張侃取所謂詩文名曰初藁懼學力之未充而願有進焉非曰能也它時閲是藁惕然而愧則知所以勉否則學止如斯而已雖有愧將何容焉勉諸拂石摘藁序長樂陳公諱槐卿字懷叔父子世科髙祖潛德隱居其鄉之西江名動一時懷叔少孤游江浙以昌其學越乃父居官之地且與文清曾公孫有交籍深契因登二卿之門待制陸公文清之髙弟閣學陳公都官之聞孫一見如平生歡觀此可以知其為人矣待制送公詩曰極知穩步烟霄路却要微知郡縣勞其待遇之厚如此及誦公次待制詩曰浩歎但傷前輩少此懷難與俗人論其受知之密如此公博極羣書尚友千載故著述甚夥晚嵗賦詩有誰能作文冢反魂為瘞埋之句蓋憫其微勞而歸之於煨燼亦自解也族從震孫過庭之暇口占授辭及得於殘編斷簡中彚而成集使其盡存雖百卷可也豫慕公清名甚久歿後二十年震孫以家集序為請某不敢以淺陋辭公曾任上臯酒官晚以拂石老人自號實取戶侍李公詞中語信知淵源端有自也寄庵囁嚅集序某叔父盱江使君始卜居德清與建炎丞相忠靖孫宅相鄰今工部郎朱公也某聞公起居出處甚詳後二十五年拜公於鄉社儀止溫乎其有容議論粹然其有德退而竊伏其聲光又八年公始謝世里巷之人相與悽惋且曰公老成人也今不復有矣某無似獲與公第二子嚴陵推官彧游因得公家集則知文獻相傳其源逺矣淳熙中叔父官儀真公送以詩千金常恨鄰難買一笑那知蓋已傾及歿又哭以詩墻東凉月頻留夜渡口垂楊幾惜春公於人厚矣某學術鄙陋不足以發揚公之盛德巨業蓋嘗展公之詩目視口誦如臨泰山之懸崖窺巨海之驚瀾戰悼悸栗莫能得其髣佛然後知詩者天地之心君德之祖百福之宗萬物之户也世人得公詩者優而柔之使自得之讀至題忠靖祠堂數篇則公家世輝赫忠肝義膽誠中興第一人物公諱皆字子同其曰寄庵囁嚅集者親自標識殆絶筆也年月日里妷具位䢴城張某謹序潘聖功詩集序龍臺潘䝉正聖功詩四十首聖功豫之友也其酬倡送别之詩在焉豫懼其名之泯録而傳之所以重交情也若夫句律深穩語言雄妙則在人之取豫豫不得而私也聖功龍臺先生猶子生於乾道已丑歿於嘉定已卯殁後五十二日始為序時十月晦友生䢴城張某志跋睡賦朱公戲成睡賦用潁水白戰故事雖然黑甜之餘一枕清風當不减羲皇上人其視吳子華賦悶又髙一著耳跋韶石圖曲江石備八音六律陳君曄繪成圖且作短歌行貽好事者按圖經云舜嘗到是邦奏韶樂於石後人因以名石復以名州夫子曰韶盡美矣又盡善也至齊聞樂三月不知肉味宜乎在千百世而下聞者猶為之興起也跋李伯時馬新定趙養源家天馬圖族人德元家抱月烏圖龍眠居士墨戲也豫近以萬錢得橫軸兩家所有悉囿於此雖然讀坡谷長篇短韻則龍眠滿天下之名不在此畫之傳與不傳也跋陳后山再任校官謝啓駢四儷六特應用文耳前輩直曰世間一種苛禮過為謹細陳無已任徐州校官日出境送東坡知杭州詩云一代不數人百年能幾見好事者造謗無已處之如平時略無詘色而聲名行乎天下此豈視得失而為變動耶至其再任又曰昨緣知舊出守東南念一代之數人而百年之幾見又曰使一有於先顛為兩塗之後悔此尤見無已之終不渝其守也噫今豈有是事耶舊見人說東坡好收拾士類而士類樂為之用集云代人作豈知無已者耶跋張景冶鎔齊齊記藁宣城張景冶開禧初元假館豫家䄂五七字相訪藏巾笥一紀半矣景冶墓檟已拱而詩名就晦溫公有言世俗不能識真貴於難得而賤於飽聞不若藏於家有同志者就而寫之雖欲勿傳安得勿傳豫當訪其子孫授以元本使呈其父之同志名雖晦於一時而傳之逺也宜矣因書於后跋王坦道江淮録豫家䢴城淮邦素所稔聞朅來清溪有畫生携胡二卿江行萬里圖求跋見其江山厯厯景態萬狀已起余笭箵興今日朱之茂以王坦道江淮録見示披閲數四深愧前盟之未踐也然吾家西塞近在一雞飛他日一蓑一笠往來於烟波間亦未晚此又大似逋者之寬限也戊寅四月四日跋小事録禮內史曰小事簡牘而已兹編珩璜也因以小事名焉雖然終日靜坐取古人已行之事議其可否而榮辱得失繫焉出處語默存焉即其已行而驗之於今其可依據十得五六誠有補於世教也深矣跋黃魯直蜀中詩詞杜少陵劉夢得詩自䕫州後頓異前作世皆言文人流落不偶乃刻意著述而不知巫峽峻峯激流之勢有以助之也山谷自戎徙黔身行䕫路故詞章翰墨日益超妙觀此三帖蓋可知矣淳熙五年十月十三日跋揀詞豫監金臺之次年𣙜酒之暇取向所録前人詞别寫一通及數年來議論之涉於詞者附焉傳不云乎不有博奕者乎為之猶賢乎已若夫泥紙上之空言極舞裙之逸樂非惟違道適以伐性豫則不敢後用鎮印紹聖四年五月少府監鑄時未有閘故兼河堰云九月九日䢴城張某志陸務觀自製近體樂府叙云倚聲起於唐之季世後見周文忠題談該樂府云世謂樂府起於漢魏蓋由惠帝有樂府令武帝立樂府采詩夜誦也唐元稹則以仲尼文王操伯牙水仙操齊牧犢雉朝飛衛女思歸引為樂府之始以豫考之乃𢋫載歌薰兮解愠在虞舜時此體固已萌芽豈止三代遺韻而已二公之言盡矣然樂府之壞始於玉臺雜體而後庭花等曲流入淫侈極而變為倚聲則李太白溫飛卿白樂天所作清平樂菩薩蠻長相思我朝之士朝補之取漁家傲御街行豆葉黃作五七字句東萊呂伯恭編入文鑑為後人矜式又見學舍老儒云詩三百五篇可諧律吕李唐送舉人歌鹿鳴則近體可除也又髙山流水鍾子期所作箜篌引霍里子髙妻麗玉所作今流水有公無渡河聲公無渡河因渡河溺水援箜篌而歌之士友郭沔相與笑後人穿鑿云又崇寧中大樂闕徴調議者請補之丁仙現曰音久亡非樂工所能為不可以妄意增蔡魯公使次樂工為之末音寄殺他調召衆工按試尚書省庭仙現曰曲甚好只是落韻郭沔云詞中仄字上去二聲可用平聲惟入聲不可用上三聲用之則不協律近體如好事近醉落魄只許押入聲韻又前輩論王羲之作修褉叙不合用絲竹管絃黃太史謂秦少游踏莎行末句杜鵑聲裏斜陽暮不合用斜陽又用暮此固㸃檢曲盡孟氏亦有雞豚狗彘之語既云豚又云彘未免一物兩用又桂有兩種陳去非參政清平樂詞云楚人未識孤妍離騷遺恨千年蓋楚人知有椒桂耳又蘇文忠赤壁賦不盡語裁成大江東去詞過處云人道是三國周郎赤壁赤壁有五處嘉魚漢川漢陽江夏黃州周瑜以火敗操在烏林後漢書水經載已詳悉陸三山入蜀記載韓子蒼云此地能令阿瞞走則真指為公瑾之赤壁又黃人謂赤壁曰赤鼻後人取詞中酹江月三字名之葉石林睡起流鶯語詞平日得意作也名振一時雖游女亦知愛重帥潁日其侣乞詞石林書此詞贈之後人亦取金縷二字名詞雖然豪逸而迫近人情纎麗而搖動閨思二公之名俱不朽識者盍深考焉又古樂府有三息詩杜工部用於詩辛待制用於詞各臻其妙待制名弃疾又辛待制水調首句用鮑明逺四坐且勿語今世詞是有腔古樂府又凡作文須是有綱目如君不見三字蘇文忠公滿江紅辛待制摸魚兒用之臧辛伯賀吳荆南啓亦用之又秦淮海臨江仙全用錢起曲終人不見江上數峯青作煞句又辛待制霜天曉角詞云吳頭楚尾一棹人千里休說舊愁新恨長亭樹今如此宦游吾老矣玉人留我醉明日落花寒食得且住為佳耳用顔魯公寒食帖天氣殊未佳汝定成行否寒食只數日間得且住為佳耳又朝次膺裁林君復踈影橫斜水清淺暗香浮動月黃昏作水龍吟中假三句云踈影橫斜暗香浮動月明清淺又秦淮海詞古今絶唱如八六子前數句云倚危亭恨如芳草凄凄剗盡還生讀之愈有味又李漢老洞仙歌云一團嬌軟是將春揉做撩亂隨風到何處此有腔調散語非工於詞者不能到毛友逹可詩草色如愁衮衮來用秦語又韋壽隆有能詩聲族子能謙調四安稅因部使者市炭不順其意至索印紙即書詞於印紙云風清日晚溪橋路緑暗搖殘雨閒亭小立望溪山畫出明湖深秀水雲間漫郎踈懶非真吏欲去無深計功名英雋滿凌烟省事應須速上五湖船雖列薦於朝僅分司數月耳又沈端節字約之元夕探春令詞云舊家元夜追隨風月連宵歡宴被那悶引得滴流流地一似蛾兒轉而今老大心情懶燈幾曾忺看算靜中惟有窗間梅影合是幽人伴日至感皇恩詞和氣靄微霄黃雲飄轉東閣觀梅負詩眼滿斟緑酒唱箇曲兒親勸願從今日去長相見寶幄歡濃玉爐香軟彼此宜冬鎮長健繡床兒畔漸漸日遲風暖告他事事底饒一線用俗語而婉麗周文忠公乾道丁亥游山經從蕪湖時約之為宰以詩編謁文忠文忠謝以詩令君到處即文場未怕簿書期㑹忙神術有時朝賜履賡歌無路贊垂裳彭州篇什元飛動工部交游更老蒼自古詩人貴磨琢試看淇澳詠文章文忠期待可謂厚矣又徐幹臣侍兒既去作轉調二郎神悉用平日侍兒所道底言語史志道與幹臣善一見此詞蹤跡其所在而歸之使魯直知此與之同時可惜國香天不管隨緣流落小民家之句無從而發也又香奩集唐韓偓用此名所編詩南唐馮延已亦用此名所製詞又名陽春偓之詩淫靡類詞家語前輩或取其句或剪其字雜於詞中歐陽文忠嘗轉其語而用之意尤新又康伯可曲游春詞頭句云臉薄難藏泪恨桞風不與吹斷行色惜别之意已盡辛幼安摸魚兒詞頭句云更能消幾番風雨匆匆春又歸去惜春之意亦盡二公才調絶人不被腔律拘縛至但掩袖轉面啼紅無言應得與閒愁最苦休去倚危欄斜陽正在烟桞斷腸處其惜别惜春之意愈無窮頃見范元卿杜詩說載上韋左丞一詩假如大宅第自㕔而堂自堂而房悉依次序才無次序便不成文章前二詞不止如范所云而末後餘意愈出愈有不可以小伎而忽焉韓子蒼茶筅子絶句籊籊干霄百尺髙晚年何事困鉛刀看君眉宇真龍種尤解橫身戰雪濤此從竹之初生及作筅子以至㸃瀹四句中包括得盡此其所以髙妙又辛幼安祝英臺云是他春帶愁來春歸何處又不解和愁歸去王君玉祝英臺云可堪妬桞羞花下牀都懶便瘦也教春知道前一詞欲春帶愁去後一詞欲春知道瘦近世春晚詞少有比者杜少陵獨步尋花第二首云稠花亂蘂褁江濵行步欹危實怕春詩酒尚堪驅使在未須料理白頭人實怕春三字可見春纍次歸使人愁使人瘦欲留連不得坡翁云花應不上老人頭意思尤長李義山錦瑟詩云錦瑟無端五十絃一絃一柱思華年莊生曉夢迷蝴蝶望帝春心托杜鵑滄海月明珠有淚藍田日暖玉生烟此情可待成追憶只是當時已惘然讀此詩俱不曉蘇文忠公云此出古今樂志錦瑟之為器也其絃五十其柱如之其聲也適怨清和考李詩莊生曉夢迷蝴蝶適也望帝春心托杜䳌怨也滄海月明珠有淚清也藍田日暖玉生烟和也孫仲益為錫山費茂和說蘇文忠公水龍吟曲盡詠笛之妙其詞曰楚山修竹如雲異材秀出千林表笛之地也龍鬚半剪鳯膺微漲緑肌勻繞笛之材也木落淮南雨晴雲夢月明風裊笛之時也自中郎不見桓伊去後知孤負秋多少笛之怨也聞道嶺南太守後堂深緑珠嬌小笛之人也綺窗學弄梁州初遍霓裳未了笛之曲也嚼徴含宫泛商流羽一聲雲杪笛之聲也為使君洗盡蠻烟瘴雨作霜天曉笛之功也豫恐仲益用蘇文忠讀錦瑟詩以釋水龍吟耳劉貢父云錦瑟是令狐楚家青衣名許彥周云令狐楚侍兒能彈此四曲詩中四句狀此景也
