body:
  text: 張氏拙軒集卷二宋張侃撰詩薄薄酒三首薄薄酒解愁顔醜醜婦勝居鰥但有粗繒大布包褁了爭羡危冠華服傴僂趨朝班就令真封定逺侯何如生入玉門關蘇秦富貴却輸負郭二頃管叔兄弟恨不茅屋三間張公厚葬保首領嵇康養生誅市闤亡羊未易較臧穀爭地適足誇觸蠻錦衣未暖沐猴敗仙舟無耗鮑魚還狂謀正使鬼笑薄命豈坐天慳不須乞鏡湖三百里不須買蓮峰一半山窮逹憂樂付與三萬六千日但恐一生辛苦不若一生閒薄薄酒免厚味醜醜婦得長年淵明飲酒聊小醉醉後清風北窗眠季倫百萬買嬌麗一朝禍至空棄捐因思逹者得其趣那用情愛汩心淵門栽五柳池種蓮瓶無斗粟囊無錢浮雲富貴不須問在世得失付自然君看曵玉垂金趨魏闕何如躡舄散䇿吳羌邊君看竒珍異味食方丈何如糲飯野䔩在目前古來知此亦自少或出或處隨吾權入秋雨過暑光薄桂子將綻添清妍抱甕獨醉有深樂不用抽叉喚李娟薄薄酒無餘味醜醜婦有餘妍君看行樂且隨分不用美酒麗女驕目前紛紛萬事如雲過塞翁祈福圖免禍屈指富貴能幾人大笑書生守寒餓書生作計亦不癡開尊對花吟好詩醜婦買魚赤腳煮醉後狂歌發真趣家園有梅一株依附籬落潘聖功喜其有古意戲占云早是江南春訊動枝頭已著兩三花癸酉歲梅不生花己卯秋尾聖功云亡愴然有感見于篇什雪意垂垂雲滿天梅花一枝放清妍與君踏雪看不足歸來吹鐙傳詩篇此詩只許梅壓倒句中染香疑登仙梅兮再四乞避舍杳渺初不到靈堅我恐么鳯暗作祟嶺梅碧落侍班聨空留佳語塗耳目歲月冉冉知幾遷况君姓氏占仙籍隨分了却塵世緣想今共梅成莫逆投壺一笑三千年江南春訊誰領略杖頭那用挂酒錢千葉支子園林緑暗花事稀蜂愁蝶怨依夕暉天工續續施巧手眼邊無日不芳菲須知萬物都是假苦泥實相第二機支花附石水清泚端莊自是蕭然姿來從鹿苑塵頓洗暫登螢窗聊發揮芳苞攢葉毋乃密清香徐徐風作圍我方寂坐息百慮對此不覺板拄頥荒山草木能嫵媚從今細尋莫相違園丁報秀野對岸芙蓉盛開我家分占清溪曲溪曲新添數椽屋屋前花竹占清妍更植芙蓉伴黃菊植時止是三寸才雨打雪埋地氣回深培淺壅那費力想見錦繡沿溪開向來為渠轉一語欲絆秋光堅不住于今秋光雖勝前花開却恨隔江浦畦丁和我酷愛花風吹芳訊到官衙淡紅深粉足嬌態高高下下依日斜人生行樂何須定蹉見此花頭次盛蜂脾添蜜採偏多蝶婢尋香屢來聘因報畦丁輕削根趁時亂插不厭繁今年開遍明年續要使長蒙天地恩主人做官在虞水亦有芙蓉滿閒地看花翻憶植花時酌酒一杯誰寄似野航池邊古梅二首池邊梅花種幾時枝柯古怪苔紋圍可憐守分不入宜開時却有天然姿因看冬夜月初上景象森然最難狀梅枝寫影巳清竒不用畫師作圖障凡花雖艷艷在眼梅花帶清清入骨時人喜艷不喜清綺言麗語寓輕忽池邊之梅格又高霜月次第上林臯平生愛梅被梅惱梅亦憐吾非年少對梅效楊誠齊體前年看梅清溪邊萬花依枝占芳妍去年看梅金臺下一枝傍竹秀而野今年梅花勝舊年急呼麴生來座前折花飲酒到夜半羌管休吹且頻看旁人笑我心太癡花開花落由天時如何苦作十日計慳風妬雨誰得知我雖不言見已慣倚著茅簷聽過鴈明年梅開在清溪不妨訪梅西山西連日雨夭桃倡杏羞蕊紅東風未傳第二訊忽吹山頭雲擁墨細聽簷牙雨成陳公堂閴寂春晝長病夫兀坐湘竹牀童子添火深炷香萬念不生兩相忘久雨浮雲四散雨意濃小池水滿不可容前度久晴今久雨緑箋端欲問太空太空高兮渺無路風力翦絲得小住農家一飽庶有期笑殺春深脫布袴連日雨意未止前日雨聲無一滴官河不堪行小舟只因連夜雲送雨軒窗處處留清幽人心不同分好惡陰晴無凖言妄吐杜陵曾賦貧交行豈是今人不如古古人今人莫預愁皇天念民耕西疇翻手覆手言俄頃功過只須付毛穎遊西湖夜來雨足半篙水西湖荷花紛錦綺扁舟載酒作清游香入衣襟風緩起西湖之景天下無萬句千言空滿紙山依華屋屋依山湖光渺渺相回環因思古人比西子又見今人比賢士東坡詩句脫塵凡不比今人較形似今時亦自有詩人毫端無窮契天理樓攻愧比西湖為賢士黑雲行視西湖水閘山頭墨雲未肯歸閘邊積水正漣漪去年苦旱望甘雨今年久陰藏晴曦天心人意默相契雨多不止尺入地俗諺云雨入地一尺歲大熟訟風擬學韓退之深恨緑箋無好辭金牛行君不見晉陵縣北異事傳夜氣將深才出沒古來至寶默有數精英之藏寧久鬱我閒試為訪遺蹤惜許邦人忘歲月不然上亦逼星躔兩無相合歸芒芴當時奮身萬䇿湖愛向東山穿香骨豈知服猛盡奔馳潛地而馳真異物雨侵古蘚滿荒臺虛名空在何有哉嗚呼金牛計已竭胡不犧尊陳帝闕槎浦並海海風顛狂衣袂摺長檣巨艦去如葉却行小立視荒田老翁擲杖呼妻妾成行再拜告官儂舊秋潮大經短堞只因鹹水入田來雖築田塍已晚哉官儂不知苗根透戽水浸苗望苗秀日蒸水氣反枯苗不如莫種只望潮自白馬湖穿夏蓋湖至後郭塘岸連日天晴雲送雨羣山環繞翠相聚湖心波起小玉山映帶不多添媚嫵十年江湖寄此身每到佳處喜生津豈知築隄限海水底事毁泐築更頻君知此理休更說只緣今日人心别西溪湖杭州西湖天下無重樓復閣成畫圖中宵與客買舟去千金間亦呼名姝自言此游有真樂月明星稀飛林烏珍殽㫖酒雜樽爼水精之鱗盤橫鋪光陰鼎鼎暗中去事業泯泯紙上拘蘇仙在郡情甚適君復居山身頗臞英風既往不可作蹤跡勝槩生荒蕪空留濃粧淡抹句思士久泥反長吁金罍有溪名西湖我來適當夏之初萬荷疊疊風捲翠群山隱隱雲依梳岸頭有亭翼然立明秀拱挹美且都名園花卉憶靈運古洞深逺棲仙姑月當下弦遲開鏡高燒銀燭行冰壺君不見水利及人居第一為壑勿學白圭術娥江下岸田為潮汐衝擊今不可墾小民勺水煎鹵于上江潮衝田漸成地地久歸鹹有其味小民泥爐候泥乾勺水煎鹽求淺利農家耕田望秋成煎鹽得錢盡力爭嗚呼小民盡力爭農家輟耒愁空生拽碑歎上虞溪湖十四處昔日是田納官賦逢秋民間缺灌溉縣官作文告后土民間以田濬溪湖田上官賦却抱輸間時瀦水旱時用縱未全熟無全逋古來人心平似砥今來人心薄于紙不念平人輸賦苦情願自為悠久計大臣奏事怡天顔以民為基古己然况乃民間推已有明知食是民之天此事傳來猶未久為雨為雲翻覆手拽碑使平命工磨别鐫竒文垂不朽鬼神訶護屹不移至今碑上光陸離噫嘻人心不如石使我歎息重歎息讀劉義門碑邑民劉承詔十世同居熙寧中越地連旱十年承詔旁郡收米賙給宗族趙清獻時為郡守上其事詔立義門且作記深秋檢旱步田隄天清日懶風緩吹行行不覺筋力倦前山數鴈帶斜飛老農指㸃前頭路便是義門植碑處義門當日篤於親十世同居無異語可憐年逺子孫微賴有此碑名未虧子孫能守前人志田雖一畝不忍離斂襟讀碑幾百字重歎今人深有愧老農耕田莫深鋤臺高要記義門居夜窮歌視梅山塘下搖櫓等畈山田多怕旱引水以溉灌不知雨勢狂衆流極迷漫君不見三鄉農一年之計一夜窮雖有人力無由逢打魚網歎山川信美何處無只許漁翁把茅居四時風月俱占斷詩人琢句空長吁漁翁平生家纍重得魚入市日曈曨褁鹽糴米了晨炊依舊尋魚波洶湧山川雖好儂不知只知取利他何為羣居出巧結新網名以攔江縱所施鯉魴未免僅出入切勿因香戀微濕破壞好景是漁翁不用健羡琢句工聖人設險今重險取與不取戒以漸小雨詩墨雲偶過雨數㸃萬葉辭柯霞山崦風聲怒號作新寒斷蹊曲港路艱險山中之民屋蓋茅豐歲往往成樂郊分有大小隨分足旋折豆秸煨冷粥采蕺歌采蕺采蕺蕺漸緑蕺山昨夜雨霑足越女提籃入市中論價不止金與玉開時花似蕎麥花亦能蔓生走長蛇龍肝鳯髓久無味却尋野䔩新矜誇聲名在世多相忌最厭薰蕕同一器我歌采蕺非虛辭采蕺歌中有深意秋蟲篇縣樓漏鼓聲逄逄秋深夜永睡未濃窗前秋色已可掬枕畔秋凉能暗通偶思向來所歷事記一忘十馬牛風醒然如寤或省起四壁不耐吟秋蛩秋蛩賦命抑何小聲則甚大凄而雄艱難七月陳王業警戒再四由姬公如何秋蛩蒙好語意謂有漸將成終初非卒然來徑去有如疾風轉孤蓬入我牀下聲更切恐我佐邑務纎洪情知官府印窠大不信民間機杼空就中懶婦絲未理狂謳野舞廢女紅競言秋蛩非促織自是合歡人不識出開元遺事緑牙作籠金作柵萬錢爭買成戲劇撫枕三歎忽成詩秋蛩秋蛩竟何為汝喙從此箝汝聲從此辭不平之鳴汝何預宵爾之織汝無衣自形自色雖天付我欲睡矣汝且住懷仁畫龍懷仁兩龍今幾載墨色欲盡形模在有時驅雨成波濤妙處暗與神明㑹三江七澤龍所居夜深簸弄明月珠為人圖畫雖左計不識憑依當殿隅世間紛紛稱畫手誰識懷仁是劉叟龍兮龍兮神其靈長使邦人書大有前日昨日行二九相喚不出手婦人紉衣先紉袖門外霜風吹倒人相見玉壺冰舊酒去年家居坐竹窗日隂移處梅梢長今年負丞在山邑並海寒氣非尋常前日昨日風四起頃刻凍合省河水鴈宿蘆花亦倦飛只待桃花初水肥望雨行去年雨多浸坤軸排簷日日注銀竹菊花巳老强飄黃荷葉雖枯猶護緑今年梅雨久不來暑風吹乾生塵埃苦求涓滴潤田畝敢望瀲灧添酒杯昨日雨意十分好雨聲不斷真是寶誰知好處放些慳尚使老農惱情抱拙翁負丞方五旬為民致禱施殷勤飛雲漸黑開又合戀戀未竟林花紛題鼠狼捕雀圖三雀相逐枯竹低鼠狼睥睨雀高飛可憐一雀翎翅短天寒日暮充爾饑充作饑腸僅一飽雀雀悲鳴猶未了至今不敢視枯竹揀得寒林深處宿題禪鄉院壁間墨梅昔年曾作梅花夢夢回衣上寒香重矮窗偶見一枝開早是江南春意動凡花不似梅之清精神骨相由天成屢從畫手細傳本但知刻畫非寫生官塘荒寺門斜掩歲久廊欹風雨颭不須晴雪明千堆賸喜墨痕留數㸃潮詩人身日夕何曾休血隨氣運長周流偶然逆轉背常理未免凝結成贅疣少年每誦海潮賦徑以人身為譬喻君看沙漲潮頭回却向别流亂衝去攔不住潮頭從此失故步人身調養勿傷和潮汛緩來爭奈何羣牛浴小港羣牛見水身半濕水淺泥深踝全入搖頭擺尾緩緩游羣牛相呼卒未休牧童在旁短鞭指童既無言牛漸邇人牛兩忘日自長水茫茫兮禾蒼蒼多稼亭前年毗陵登多稼萬頃黃雲在亭下斷碑依壁毫髮微擊壤老人歌聖化今年負丞到㑹稽州園瓦影碧參差中有一亭容數客鬱鬱兩字標璇題吾聞國以民為本民向東郊事耕墾與民同樂識見髙秋成沽酒來遊遨山中老人送蕙花山荷葉因成長句山中老人久不見忽然遇我清溪濱手把幽蕙數十本清香襲襲侵衣巾向來我曾著數語定是久暗蛛蝥塵老人詳說種蕙法泥酥沙軟水力平亂山深處少人跡斂藏不耀席上珍即今得登君子堂藹然能被天地仁小盆别種山荷葉種時近水開晚春青青之色亭亭立似與巴豆為弟兄不然太華山頭種小變厥初翻樣新草木至微同是性出處一異虧本真老人前身恐是郭隨緣衣飯甘淡泊爾雅讀書吾未能聊為老人書大略明月堂聞松風此去中秋才七日明月堂前秋可即山深水逺斷人蹤僧云居此探消息老松夭矯雙鳯翔翠色依月新凝光神仙所居無乃是我來訪古摩蘚蒼夜長月正當窗白風入松梢聲劃劃娥江元自通濤江脫似江潮撼僧牀君不見東坡先生豪一世寄語重門休便閉胸中吐出黃初詩詩勢如潮敻無比又不見后山居士真仙人每遇奇觀精神生悠悠江水流不盡晚日浮沈潮勢平披衣起坐寂無語松影參差復如故風聲四散不暫停遙見江流趁東去簡曾舜卿三十五日不見君今番寵訪又三旬喜君風度勝似舊未暇取酒細論文西關之西蔣灣北隨分各有數間屋只待梅花摘索開共君清賞意自足蘇李河梁相别圖古人重交情初不分秦越詩句聯珠璣中心瑩日月何人作此圖筆墨巳超絶因圖想當時交情重于别君不見朔風漠漠沙草寒子卿仗節歸漢班河梁執手不忍去安得同飛無羽翰陶夢得弼袖詩見訪用元韻大雅不作詩格變只今知誰傳妙手既愛虛飄狀風雲又愛雕鎪杯杞柳半生于此寓吾身曉吟夕鍛苦用心可憐汩汩逐外物未免漸漸虧天真我今久已乾面唾閉門政要深自坐春來織柳鶯弄聲秋至凋葉蛩相和牀頭一卷古人詩疾讀緩讀莫相疑君不見口耳之學求宗派不問血脉在不在十里鋪歌山容偏向秋深瘦轎行十里日將晝斜斜雁字雜真行節節芙蓉攢錦繡向來頗恨日月遲而今翻道光隂驟是中有䇿君豈知心要清閒手長袖片言輕發潛禍機駟馬難追焉用救州家因旱授民詞差官下縣拯民饑嗟豫竊粟慚一飽破裘短袂肩相隨君不見流行坎止言所寓初程且到十里鋪雨後生凉絡緯聲清可愛元蟬聲清入吾耳暑氣駸駸猶未已殘花挺挺留鹿蔥嬌態娉娉是荷婢偶然一雨雲紉裳池邊雨過風送凉小蟲深集楊柳影一段笙歌清更長東坡祠詩先生筆端侔造化妙歲清名滿天下久知富貴等浮雲已悟世情同啖蔗置居陽羡山水妍湔滌埃塵聊稅駕豈知地主無所容天地雖寬如傳舍一朝焚劵還其居意氣不迫愈閒暇年深此事競莫傳欲紀詩篇愧陶謝先生祠堂幽且深今人那識古人心但把丹鉛較形似滿廊遺像成兒戲象田老饋山茶用東坡先生韻奉寄前時著腳清淨坊山童殷勤進山茗半杯春雲滿晴空午困瞢騰頓能醒山深有鳥聲清圓俗名搗藥頗堪聽從來不起市朝想定亦久知存所性何如搗茶伴老衲疾病去盡竟歸正數株寒菊帶秋清一篆香烟留日永顧我服官走芳塵心雖超悟力未猛氣猿意馬難同防未免稍縱肆頑獷人言茶味怕齒知日漸月漬遣胃冷不然除膩立奇勳氣象森嚴費忠鯁建溪早芽細如針來春喊聲遍山嶺銅模新製號鳳團絳紗斜紉護龍餅竹窗拂拭金石堅碾破霏霏光炯炯舊曾識此今罕見山茗一旗生舜井冠裳不加貌自若厥包斷不請僥幸須知老衲定中人任柳生肘木生癭獨孤憲公檜古人聲名期不朽一言之謬如此酒今人隨世就聲名浮雲變滅無不有詎知老杜可歎詩爭似憲公當陛奏文章逺繼商周作氣骨已逼秋山秀晚分符竹行其志務在人民安畎畝仁聲既逺姓氏傳遺跡常存鬼神守老檜槎丫枝幹古參天黛色猶衝斗終然依附得聲名孰謂今人不如否立冬後述情山城並水寒較早鴛瓦新霜寫花草五朝三朝風蕭蕭九日十日雲飄飄秋將歸去冬又至寒色不遮萬山翠小窗倚徙片時間有美人兮隔江水田家歲晚田家舂米盛土倉祠竈新鱠鯉與魴粥分口數願長健不賣癡呆儂自當爇火照天田蠶好打灰如願從所禱一聲竹爆陽春回城裏看燈歸已曉我生把筆作耕鋤年餘三十腹空虛不如爾農隨分足只怕門前人催租石人行君不見深閨有女禮自防心事炯然並秋霜江頭日日望夫壻願身成石立道傍人傳其下多風雨天地默與之低昻靈犀一點磨不盡歷歲既逺名獨香因思萬物皆歸寓獨許頑質加冠裳刻形肖貌此何態儼然如在端而莊惜哉愚俗竟莫擬翁媼同處天一方嗚呼翁媼計雖得胡不為柱支明堂纂風浦短茅黃瓦排門戶祖父從來在此住不思城市好風光只要秋成有分數年年借本事荒田探前望後庶有補海門相近潮吐吞不似今番難撑拄夏初幼婦生小孫嚶咿作聲求飼乳婦饑苦語出肝腸搖頭怕說纂風浦喜雪童謡屋上三日留乾雪添得人問訝奇絶不須待伴窘風雨只要呈祥了時節小兒戲拾疑是花舞低婆娑最堪誇最堪誇處漸堆積生寒到骨思歸家雪飛不已戲作長歌清溪怒號多北風乞水來自河伯宮多應飛雨作寒色呼吸雲氣鞭癡龍冬深萬木凍欲折那有卉藥成纎洪造化小兒一餉戲鎪瓊鏤玉何其工庭前婆娑萬花舞春意已遍翡翠叢可憐世情多冷眼怨咨競欲訟天工了知妙處不用力豈為汝輩眼目供明朝晴烏耀燭龍向之幻景須臾空止雪用東坡先生韻常年有句吟雨葉今年只了吟飛雪社中誰是錦繡腸令我褫氣歎妙絶固知天運陰陽戾那問家園花草折逞妍妬舞費斑鏤幻色潛光亦消滅前時有句送渠歸日華搖金雲暗掣滕家娘子耽清游瑣碎回風到簾纈只須頭次陳堂堂底用十番空屑屑民家束緼帶濕炊醉客糜金謾飛瞥海隱來徵鶴隱句恰如白佛偈重說昏霾未見天清明石炭擬鑄一寸鐵
