body:
  text: 提要張氏拙軒集六卷别集類三宋臣等謹案張氏拙軒集六卷宋張侃撰侃字直夫其事蹟不見于史乘据集中自稱淮海則當為揚州人而自寶祐維揚志以下記廣陵人物者從不能舉其姓名獨錢溥祕閣書目載有張拙軒初稿四册焦竑國史經籍志有張侃拙軒稿四卷而宋藝文志書録解題俱無之宋人江湖前後諸集及近時選録宋詩者亦多未之反則其湮晦于世蓋己久矣今永樂大典各韻內尚頗載其詩文或題拙軒集或題拙軒初稿勘驗標目與錢溥焦竑所記並合當即其書惟其人無可考見今即集中謝樓監丞為其父作行實一書反覆參核蓋侃即開禧中知樞密院張巖之子也案宋史巖以𠫭知政事進管樞密督視江淮軍馬書中稱其父訏謨兩社出董戎師歷官既已相符又巖附和韓托胄用兵敗衄御史劾其朋姦誤國奪官而書中謂其父惟主于和以靖國家或者不之察極力詆毁云云其言皆為父辨白益足與巖事相證史又稱巖家本大梁徙揚州紹興末渡江居湖州考集中歸來詩有結亭苕水旁句江淮録跋中亦有吾家近西塞語知其卜宅吳興尤為確據至其生平宦蹟雖不盡詳以其詩文考之則嘗監常州奔牛鎮酒稅遷為上虞丞尚略見大槩巖以諂媚權姦致位通顯為世詬病而侃獨志趣蕭散浮沉末僚所與遊者如趙師秀周文璞輩皆吟咏自適恬靜不爭之士故所作亦多清雋圓穩時有閒淡之致雖未能開闢門徑自成一家而其集久佚僅存實為世所未暏謹排訂編次釐為六卷俾言宋詩者猶得以知其名氏焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
