body:
  text: 張氏拙軒集巻六宋張侃撰論説銘贊傳記祭文四皓論士有立百世之上所守者定而所施不易當世許之後賢髙之噫豈容輕議之哉方劉項争功狐媚狗趨覬一銖功天下滔滔彼四公者茹芝服栢笑傲商嶺身外無物其真有所見耶抑止於權宜耶漢得天下季戀戀有兒女愛雉刼良計以四皓對四皓出漢祚安又豈權宜而止耶噫豈容輕議之哉所守者定宜其所施之不易也不然漢其殆矣四皓名其穹乎夐乎硯説嵗在壬申山隂石身之以端石方斗研見贈肌理細膩圭角端好嵗在甲戌雲間朱唐卿以歙石月眉硯見贈舊坑中物刷絲如髮整而不雜自吾生得研雖盡此猶可作傳傳後失於壬申已卯之嵗昔唐子西作家藏研銘且謂研鈍物也静物也可以乆今併其鈍者静者而失之吁天下事寜有既耶回視吾學日就荒堙雖無此研可也而吾平日獨㳺清閒寂寞之濵所謂生涯研真耐乆交豈天怒吾蠧書之夥而故為是策耶俱不可得而知也余失小刷絲研五日作文記之又十八日復見嗟乎心之所好思而得之失之不乆復歸吾室是研豈終吾耐乆交耶雖然吾從今日與研結誓以吾之才不足上玉堂以吾之用不足濟世務研毋戀戀研茍從吾於蕭踈竹下冷淡梅邉一杯竟醉放筆成詩以寄形天壤間研從吾斯説乎研曰諾時已夘二月二十五日硯銘爰來天庭爰旅玉堂愧我才拙孰文孰章晝清日永花木之房或箋爾雅或擬漆莊不然寫六幅之圖而堂上之生風霜睡寒山拾得贊人居火宅無不有你亦投身携掃帚一朝放下困騰騰明月寒潭只依舊僧熊畫布袋贊弄盡精神真揑怪横拖拄杖街頭賣忽然兩歩走歸來四大不收圖睡快蘇李松石圖贊東坡先生錦繡心胷戱作怪石一時告功當其落筆雨霈風從齊安赤壁恵州鶴峯十年飽覧孰可攖鋒温潤枯淡變態不同一巻之石作倚盤松龍眠居士孰覊其蹤一瞬八表如鶴在空東坡頌美佳名日穹明忩展觀松古石窿天下之寳豈間窮通東坡之節龍眠之隱一異出處如琴加軫吁嗟二公人中之龍百餘嵗後仰止英風我生後時何以形容紀述惟贊愧非揚雄辛已自贊徐永昇畫時予弱冠而綴文趙可大畫時予三十而有立錢誦畫時予究道之出入蓋嘗晦其聲名謝其等級惡脂韋而取容與傲世而長揖客問直夫處事太執直夫俛而笑曰人各是其所習戊寅自贊有伯夷之清而無萬世之準有孟郊之古而無一代之名能操守而氷潔視富貴如雲輕前乎直夫是一臞叟後乎直夫是一書生既不能潤乎詩書又不能事乎縱横客有過者曰嘻視彼拙貌徒汙丹青蔡媪傳蔡媪湖休村人事夫毓二女女及笄嫁比鄰温煖家居亡何良人死媪日求於市得十數錢以餬口既老就二女以養嵗往月來頗厭之問長女不應問次女又不應於是撫膺曰吾老矣何以生為廼粥巨燭夜半即所居茅屋爇以火且膜拜曰即死死則吾事竟矣隔岸人見火光竟天蹤跡至媪室燭存寸許尚膜拜因劫其所以然媪對云云明復如是又燃中指肉辭骨立信宿與他指無異媪曰吾將火其身報謝天地雖奄奄為九泉下人猶勝居人間世鄰有竊知其言者斂金益薪擇日而火焉女聞媪死若塗人而無戚戚之色嗚呼以貧而失其指又失其身豈得已耶是必中心有大不堪而至是耶昔韓退之聞刲股救母欲聲朝而置諸罪使聞媪所為將以何罪置之耶嗚呼此退之深得古人之用心也使人人刲股以盡孝則古者為孝之道泯矣况又不如刲股者耶女不能以養媪不可也媪不能以固貧有虧受諸父母之道又不可也然則罪其女乎罪其媪乎其必有以處之矣時嘉定辛已暮春因書以為戒秀野記青山在屋上流水在屋下中有五畆園花竹秀而野蘇内相題司馬迂叟園詩也迂叟窺仁義之原探禮樂之緒照映一世學者宗仰今吾家小園架屋三間與迂叟園相類詩曰髙山仰止景行行止庶幾儀則其萬一焉乾元寺詩壁記乾元寺在邑之前溪北岸嘉祐中受業僧妙圓刻大士像奉事彌謹遇雨暘禱輒有驗又日與仙人㳺即所居名曰似賢堂雜端劉公述作三大字掲焉中更兵燹扁額不存曽孫岑再書而刻之額兩邉細書初此地齊茂林修行實紹興十祀夏六月壬子也去雜端書額時甲子一周予寓居邑西聞寺有似賢堂尋訪舊址則巳為他僧寢室矣每拊扁額嘆繼者之難其人嘉定癸未予自常之金臺解組歸舎寺僧師壽了隠來曰明公前日所拊扁額未足以見妙圓為何等僧今得詩碑四䧟於懴堂東廡壁間願求數語記嵗月予曰太守錢公通守宋公邑令王公雖未詳出處誦其詩則知贈妙圓也雜端劉公直道清節照映一世有孫同鄒道鄉子姪肄習此堂今廢不存文人思士為之扼腕昔孫何未第㳺徐州觀音院其後陳無巳記净佛殿且曰物有盛衰人有向背向非孫公曽㳺無巳未必有此語予於是亦云師壽了隱收拾舊碑以幸好事者之觀覧錢公詩題作西院竹軒即似賢堂爾堂後舊有竹詩中又有所謂頗聞靈泉象缺月當是㳺石壁山因併及之嘉定十七年三月五日拙軒記淮海張某以拙名讀書軒有年矣每見前修多以拙自號則又解曰吾非大巧若拙之謂也吾非巧竊所恥之謂也實杜少陵用拙存吾道之意以見吾非有心於為拙特欲不失吾之本然者而巳使世之巧或可以移吾之拙則道非我有矣吾日懼焉因書以自警娛老堂記三山陳姓最著有諱元禮者隠徳未耀當時名勝低簪紱友焉澤之是為族從孫能力學不墜家聲踰弱冠之三嵗負笈㳺西淛以昌厥學渉八年始預漕薦於是思榮親之計則曰始之出㳺也盖不得巳時大母春秋髙父母雖能盡子職供婦道震孫為子為孫其可一日居於外歸舎未幾嵗在乙亥天子有事於明堂澤之大母年百嵗格當為命婦帥臣未鄉蔡公上其事詔從之鸞誥金軸自天而下鄉閭榮耀以為希濶之遇澤之猶未滿擇婦奉兩世之親雖菽水之懽踰於鼎養父母每諭之曰吾家素清貧於子職婦道罔敢有闕汝既有分寸功名宜自力於學萬一入手庶為父母之榮澤之濡滯其行乆而再逰於淛今三年矣忽謂某曰父母今七十有五即所居扁曰娱老蓋欲齊大母之壽其後帥臣如蔡公者舉已成之典則寵光再至吾家震孫亦不敢廢舊學以幸造物者之興憐也某曰澤之可謂善為人子人孫而父母可謂善為人父母也澤之有子五嵗能誦詩百篇朝夕嚶咿親側如澤之侍大母時世世相承以濟其美其盛也歟竹坡記内表李山甫以竹坡名其居求余記之余曰山甫居有竹乎曰無鄰有竹乎曰無然則胡為其居而名之以竹耶昔蘇文忠有不可居無竹之句而竹之名愈著山甫每遇有竹處眎其色之清然其中之空然挺挺之節雖炎曦虐雪了無阿附及籩篚宗廟椽角屋宇細而為規矩者皆合於理其有功於世也大矣山甫長余一嵗自今宜掃除舊染洗滌心官如竹之有收拾以佚其主是又余之所深望也嘉定癸未十一月望䢴城張某記九里廟記予官金臺近一年居民市楮鏹詣九里廟膜拜因問之民曰九里廟神二人初兄結屋百間弟濬井百口屋井甫就互指其數兄數井絫日而缺其一弟居在前兄居在後其所缺之井今在前殿座下又曰廟有嗚呼吳延陵季子之廟墓十字碑又曰井散在九里間舊名廢井昔有人携妻謁神妻墜粧飾於井夫裸而入出則兩股爛熟井間有沸者其靈異如此某等嵗一詣焉予嘆曰神怪茫𣺌聖人罕言傳稱泰伯三以天下讓民無徳而稱焉季札棄其室而耕卒以命授弟餘祭故當時嘉札之義封於延陵號延陵季子今曰數井不全其數而位居於兄前其説妄矣昔太史公曰延陵季子之仁心當時視其國如敝屣豈歿而祀於所封之地以區區禍福驚動愚民其説又妄矣史稱孔子未嘗㳺江南延陵十字碑或云非孔子筆今常潤所祠之地俱植焉世既逺予亦不得而考東坡云所聞湯泉七皆棄於窮山之中山僧野人之所浴麋鹿猿猱之所飲今廢井即湯泉也既不能澡雪人之精神而乃麋爛人之皮肉恐非季子本心韓退之羅池碑云生能澤其民死能驚動旤福之以食其土恐季札亦如此則與當時棄其室而耕異矣予詳其事書以遺居民毋墮流俗淺見當思季子辭遜之風功徳及邦者深除其妄而正之云唐隆宣大師開山記通州浪山寺僧常滿同其徒常真智褱㳺豫章得巨木五千導江至於京口遇風濤莫知其所後㳺圌山山通流木盡集鐵和尚五百年相待與老傁指迦葉寺之言符合廼作道塲於茲山工未即而寂後人因而成焉余嘗入東霞寺東殿即常滿真身所棲之地號隆宣大師今曰滿菩薩者土人保傅嬰孺有求輒應如僧迦圓應而名之夫以元和之迎佛骨㑹昌之廢佛寺通二十六年而毁譽相反若此然其道不知果何如耶常滿之開茲山豈不欲通都大衢顧乃於清閒寂寞之濵謂不如是則非釋師之意也寳厯在元和㑹昌間莫之前焉莫之後焉輪奐宫室治田濬井可謂善籌而為悠乆地也廣了為恵澤謁記故詳其事使歸而鑱諸石嘉定十五年正月十五日記四并亭記唐栁子厚茅亭記獻妍呈媚攬景縈情文之詭異争麗而予服之有年矣他時粥地百弓傍山水録其記為障此非有志事功而誼乎古寓意物理而恢乎逺者孰得之某之志未遂外舅朱叔嘏已先囿之矣叔嘏屋後有隙地舊屋三楹楹前去土為池種青白蓮蘘荷菱芡左右列嘉葩名卉又植竹數十挺在墻隂是足以朝㳺而夕嬉也是足以心休而身逸也叔嘏明春秋左氏學嘗試於浙西江東漕以異恩随郷里秀彦上春官務端慤而惡浮巧不阿時好顧禄仕名譽如太空浮雲之去來君子嘉其有守而師友又知名士宜乎守之定也於是取叔嘏之辭而記焉其辭曰甲子之秋汎秦淮抵廣陵訪竹西平山舊迹遂飛蓋為州園㳺登四并亭送目天外雲煙變滅風雨晦冥名之宜矣昔文人思士題寫殆遍名之美者衆所悦也是為顯者設若獨善其身之士安可齊其出處而扳顯者之所有然名之美固人之所慕窮與達各有慕慕在乎此則美在乎此今將架木為亭結茅而覆其上署額則竊取其名暇時上斯亭寓意物理消遣世慮則禄仕名譽不介介於心逮物理歸於寓徐思事功之立可行則行可止則止省吾平日所學者畧道其一二名雖同而慕不同窮達之有間也或人云云則吿之曰吾美非彼美彼美人知之吾美人不知親服聖賢之書不同小人之歸復以訓子孫一也子孫可教使之從師㳺二也東郭二頃田稍給伏臘三也亭雖小可以逰覧吾得而有之四也美若是奚窮達之分而後有所慕耶君子益嘉其有守叔嘏不易其守來年天子有科詔矣是雖惡浮巧不阿所好乃一主於端慤冀北之馬群無良焉必有求其良而充世用姑少待至亭之立名之寓又豈真虛言而巳識者推其行藏之合於道而為賦詩者某未欲盡其語也犇牛鎮㕔壁記右通直郎賜緋蔡君直右迪功郎李君漳以紹興壬子辛巳監鎮務予莅職數月見禪鄉院題梁龍祠碑石有二君姓氏因命工鑱於石以補壁記之逸又見鎮父老言昔兼税朝廷省併是時財用裕而嵗額定眎今名色多端大有間矣嘉定十四年十月望䢴城張某志祭樓屯田文惟公卓犖之行縝密之文父兄師友曄乎著聞不恃貴胄出處任真不矜巳能該綜尚勤舉措近厚撫摩以仁江城牧守蘭省侍君陳二三策心和氣平每期今日堯舜君民宣猷重望名傾縉紳退惟先世辱交最親嵗晚書汗久而愈新公能繼至契誼尤臻紀述官業豈無他人再拜敬請謂有前因公嚴史筆雅哉典刑青天白日舉知清明向者小鬱今獲大伸感入骨髓詎敢浪云舊冬入都晉謁賔閎莫瞻俊英徒走踆踆虞水蕞邑鄭鄉比鄰公嘗渉筆歴二十五春人思徳政無非真情深慚佐理勉繼芳塵公不我棄警規必頻望公自此位登上卿望公自此夀開百齡鄉稱前輩朝推老成室則甚邇浩渺魚鱗誰持訃問遽至江津輤車莅止奠觴躬陳嗚呼永己慨想平生祭虞文善冠之文年月日䢴城張某敢以香酒祭於省元千一丈之靈嗚呼平生師友惟道可尊如文善之誠慤某敬心之所存今其巳矣往奠一樽
