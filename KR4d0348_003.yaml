body:
  text: 張氏拙軒集卷三宋張侃撰詩梅江梅有逺韻不與世浮沈誦我壁間句知渠歲晚心踈花生古意暖艷啅幽禽此處知誰解霜天啓角音時雨三首旬日風消雨今朝山出雲柳深開潤色荷靚匝清芬江燕新調語沙鷗自引羣農人相賀語田畝可耕耘時雨催農事庭陰散午涼地寬平野色雲密閟林光送目孤村外舒情小艇旁斜暉猶返照何必問商羊矮屋原卑濕頽牆上古苔世間多少事眼下兩三杯詩卷無人惜涼船有客來明朝梅已斷只是一聲雷遊西湖李氏園池湖水平春色名園接杳微輕風生翠影細雨醒香霏意足休嫌野身間不受鞿隔舟多妓女歌逐片雲飛歸鴈亭逢所知歸鴈亭前别于今又五年水深涵落日春晚尚餘妍把酒聽吳曲浮家入楚天秋風遞消息為問有書傳黃龍洞傳道黃龍穴深藏不測淵翠藤依夀木石壁隔塵緣恐有神仙分來觀古洞天善權知不逺雙鶴舞胎仙何道兩山兩山青不盡吾眼未曾經問法維摩室留名處士星地深藏白霧天逺納蒼冥我亦倦遊者何時結草亭秀州城外月色明于晝間登百步橋天低雲宿野地逺水通潮吹笛回賔鴈彎弓絆落雕年來無片善所得是風標初秋夜坐酷暑秋仍有臨流興未忘好風吹過雨午夜得新涼促織聲偏細舂鋤立自雙人生隨處好最好是家鄉夜深天籟息露重月華新此去何須懶從來只任真入秋山有色積雨水生粼萬事乘除耳一樽聊可親雨傍海風先冷殘秋雨漸踈柳凋間搏黍水淨見舂鋤遊客惟笻竹民家半草居近時潮候訊玉筯當園蔬明心院村東古蘭若門徑久荒涼鸛舞風幡小蛩吟露葉黃潮音隨法轉茗碗怕詩忙一片牆根石無人為發揚嘲絡緯時序方中伏簷前絡緯鳴涼風雖暫至秋氣未全清荷葉緑偏斷芙蓉錦漸成勸渠莫多事促織又司衡中夜起坐納涼風迅中宵起簷虛入户涼一輪明月影八尺緑筠牀久望重梅雨間尋晚芰香天河漸分曉結語問牛郎趙紫芝詩卷天樂無他好精神盡在詩墓藏山色逺語到水心知名極天還妬身亡道自垂勿嫌官職小君復鶴相隨周晉仙詩卷晉仙新寺住曉夕在吟邊相去二三里聞名五七年西湖聽鴈夜霅水釣魚天語逸山精泣宜為萬古傳柳下詩卷退之名振世無本肯從遊既以吾儒重方知異説休不才空剩語馳譽勝荒丘朴老深于律遺篇處處留偶成細雨遲春色間雲接曉天清時依薄宦秀句近華箋地冷梅枝少川明竹影圓翻思年少日折柳繫漁船花事立春踰十日猶未見芳菲雲葉垂垂滿簷絲緩緩飛池魚寒未上林鴈暖方歸因靜無思慮由人論瘠肥芍藥春意垂垂盡名花續續開誰知傾國色元未著香埃曾向蕪城見還驚苕水來貪看詩律細忘覆掌中杯春盡韶光餘十日明歲又重來柳外黃鸝怨山中杜宇催一番風送雨幾處錦成堆且飲深杯酒攜笻緩緩回隱者山蹊通線道舊有隱人居生計多藏芋秋盤近薦魚簷牙松得夀籬角草堪鋤只欲逢熙運誰能更上書雨後雨後秋容稚雲遊日色微逺山依舊瘦汙水已新肥燕子稀踈舞螢光冷淡飛官間清到骨無是亦無非秋色野闊因秋見山高入霧微曉看天色暝午更宿陰圍有地堪容隱無言且息機為知間處好不是厭輕肥夜宿舟宿隄邊寺天虛露氣清秋從今夜冷月比舊時明水鳥紛紛下墟煙冉冉輕田家生計好不逐世間名家園夜月荒畦多古木月送影婆娑須信間中好翻嫌塵事多簷低排逺岫堂近俯清波夜靜頻來往漁樵互奏歌來鴈雲外新來鴈風回字倒看深知吳地暖生怕塞天寒水國沙汀逺西疇稻粒殘排羣宜穩睡報夜喜平安宵征澗逺泉聲激山回月影重宵征滿涼意曉色帶秋容衣薄初霑露橋陰久傍松茅簷因雨濕催織是鳴蛩伯牙瀆古賢真好事瀆以伯牙名岸轉天無盡春回草漸榮當年流水曲今日賦詩情可惜知音少令人恨未平張涇滙我間尋勝槩人自號荒郊木老含生意橋迂接水坳浴鳬歸艇集戲蝶野花梢泛宅吾宗逺虛勞歎繫匏穀日姬旦陳王業農官報歲功新晴春滿野宿霧曉披空賣卜煩鄰叟知時訪老翁更須圖夕雨土脈盡豐融欲識田家趣清溪曲抱村齊民當日術學稼古人言瑞實歸千室餘功到小園元機亭育際始見道尤尊夜宿育王莊北窗破壁排矮窗新篁出粉牆開尊侵緑色得雨借初涼名保千年在身安萬念忘詩情亦漫興何暇細商量再用韻促季文結水邊亭一朝飛驥足十載歎龜藏臨水軒亭好逢人笑語涼須先心地逺莫厭斧聲忙未數漳南景裁詩拂蘚蒼宋劉繪張融周顒一時勝士居皆連牆故朝野為之語曰三人共宅夾清漳張南周北劉中央舜卿與朱季文盧子長並居故云寄題富沙倅廨靜涼亭詩南中多暑氣來覔靜涼詩但得政無擾自然民不欺亭中人蘊藉欄外水漣漪想見賔朋過銜杯樂聖時和朱季文即事種竹多臨水山隨雲影藏夏深元有暑秋淺未全涼箇箇飛螢入雙雙歸燕忙幾年觀物理不復叩員蒼將歸將歸浮小艇水色緑添痕楊柳迷低岸鶯花滿舊園日長迎雨燕沙暖起風鴛眼界須當闊臨溪築小軒歲晚水斂風生壑雲深雪滿天寒光憐袖薄瑞色向梅妍淺酌生春酒奔牛酒名間賡餽歲篇吹燈看家信獨步到窗前拙軒偶書三首歸來開一室復以拙為名道在何妨小身間不用榮柳絲愁斷續花靨笑輕盈只此觀天運逢時物自成廊深人罕到益友兩三人得意文章妙相忘情味真蜂來窺硯水燕去潤香芹如此逍遙過胸中無點塵侵晨門外立山色已浮春斫竹流溪水提籃擇細鱗柳濃將作絮梅小未生仁自拆紅泥酒歌呼到北鄰足軒詩人爵何須戀翛然郭外居隨緣常二滿散帙富三餘劖石梅花賦堆庭柿葉書呼兒邀客至反棹或巾車定軒詩門前流水競洗盡市塵交秉我中心正從渠異説譊向來多肘柳近已去心茅隱几觀天地晨曦動翠梢十月初五日自白門之丹陽宿於驛亭中是夕風雪大作輾轉耿不寐青燈遙夜闌關河千里逺風雪一窗寒旅食腰圍減征鞍髀肉酸想知雙鶴髮朝夕望平安感昔先君年壯日邂逅鄭當時把酒對今月彈琴論古詩眼前多俗韻徽外少人知除却瑶山老無繇訪斷碑先君舊年訪璉市鄭參議之子次修論穎師彈琴詩甲戌春遊瑶山寺逢一老僧備説論詩時事因得斷碑所載正月尾雪今歲春來晚晴寒此舊添雲深天欲雪風定瓦堆鹽幽艷迷瓊屑前山隱翠尖詩人疑是瑞就喚野人占觀薌林堂帖功名落落俟天時險阻艱難定漢基老子挂冠從早歲諸公頌德盡良規既知中夏馳清譽合去薌林賦好詩事到百年方始定晴窗細與拂烏絲胡文定以扶持三綱推許向公新晴披披雲陳從東去薄薄晨光向北開花態最嬌依宿靄柳枝無力輥香埃心清更覺虛簷逺事少緣無俗客來野鳥互吟間自在三三兩兩啄莓苔夜坐青燈點粟伴窗幽檢盡詩篇倦即休萬事如雲同舞燕此心似水羡飛鷗客來不過談間事我壯須當辦小舟雨雜風聲欺客枕清眠無夢兩悠悠久雨今年梅雨已淋漓梅盡多時雨意癡漫説池荷能潤色豈知岸柳亦顰眉一天黯黮雲陰殢六月清涼客子宜兀坐小樓香半線紛紜萬事只心知梁湖夜望秋帶涼風葉互鳴風隨潮汐候時生導源甚逺紋微起乘勢初來花轉輕白鷺幾枝間可畫晴山數點曉猶明偶來又得詩中計久矣難成五字城和中秋韻月魄詩魂兩鬬清却嫌歌管揭危亭遙知山鬼形難遁誰洗天公眼暫明物外風光何皛皛人間爝火謾熒熒酒狂徑欲騎鯨去一拂鴻蒙散窅冥奉寄曾舜卿二首我與懶翁非淺交向來寓止在西郊繞庭草際緑浮色滿檻花梢紅解苞只要同心勝膠漆豈緣一字倩推敲四年會面休深歎辛苦揚雄述解嘲一幅吳箋秋滿天幾回書字欠人傳知君性懶存吾道顧我官間只舊年詩句鍊成猶未穩酒杯空泛未曾傳庭前柏子西來意近日能明若箇禪寄曾兄富貴功名莫問渠間中氣味復何如年來格外添新句夜靜燈前理舊書用拙不妨存我性得時未免駕高車君家文獻人難比會見芳名上玉除次王子元韻二首眼看珠玉混泥塗竒貨何人解與居賣劍買牛知己晚壞車殺馬計何踈卑飛莫辨雞羣鶴高義難兼熊掌魚却羡臨川王介甫愛君獨上萬言書皮骨三年走道塗移文良負北山居甘貧我固輕諸阮勇退吾猶恥二疏好著短衣看射虎休彈長劒為無魚人生識字多憂患飽睡從今莫讀書用秦少遊韻二首春風花草繡林臯索莫誰憐止酒陶晚學文章真末技早知州縣亦徒勞年光可歎石中火人事休磨笑裏刀分外更須貪富貴如求兔角與龜毛未工射雉怯如臯欲挂衣冠慕老陶莫為功名多戚戚須知身世兩勞勞求魚切戒空緣木買犢不妨先賣刀未有田園作歸計年來留滯感潘毛戲用東坡先生韻二首冠世文章李翰林掀天功業漢淮陰抹靴捧硯榮雖甚受鉞登壇眷益深逺竄夜郎揮老淚生擒雲夢負初心窮泉二子應追恨不解君前早脫簪倦看冠蓋閙如林夢想扁舟破晚陰步月南樓情不淺臥風北牖味殊深朱旗黃紙非吾事木板青衫負壯心遊宦半生成底事鬢絲零落不勝簪豚犬夜誦東坡贈王子直詩堅索次韻余率然成章可笑深不自量也年來典盡鷫鸘裘逺宦深慚馬少遊痛哭恨無禆國論偷安終不為身謀誰憐飢虎空搖尾却羡寒龜暗縮頭但得渭川千畝竹也勝霜鬢取封侯田元長和煙字韻詩見寄復用前韻幾年無夢到凌煙身似春蠶已再眠寡合荆人和白雪獨醒蜀道上青天漁樵好去任爭席富貴儻來羞執鞭見説高真足官府不妨長作地行仙用文伯起韻老人癡鈍性可憎微子誰與為友朋久廢未容收顙馬一呼寧復責飢鷹無緣下榻留徐孺好去登門訪李膺吾道不行吾己矣短桴浮海要同乘和曾舜卿秋日偶成久無名酒共君傾靜對溪山悅我情雨沁荷花多退色風穿梧葉強成聲乾坤納納從來大歲月堂堂未用驚甚欲著書傳後世只愁議論太平平樓源清叔舊有詩云樹冷鴉啼月天寒鴈帶雲曾舜卿足成四韻又有詠雪詩云來從天外無非雨散在人間盡是花亦佳句也清叔死已數月因用後二句為詩弔之見説樓君用志佳曾吟雪句被人誇來從天外無非雨散在人間盡是花偶到銅陵尋舊友歸由宣郡棄生涯碧雲暮合愁偏聚孤塜纍纍日易斜甬東侵晨風雨暗城樓渺渺蒲帆海盡頭逺景暫煩雙目送清遊不負此生謀半杯緑蟻衝寒色幾箇白鷗分客愁相近梅開遲雪舞肯容興盡剡溪舟池邊簿書才了聽蜂衙間到池邊景漸佳雲亦有心時散影風都無力晚生花勞神空覔三年艾妄想休乘八月槎睡思全清還解否歙瓶新瀹建溪茶書考二年薄宦在金臺牆角雙扉向晚開罕有金貂來換酒且看野馬共浮埃已書下考甘平進久律吾身愧不才却喜清貧如昨日知心相識自然來負丞虞水恰年餘誰信官居似野居乍起柳風清午枕久因梅雨理殘書眼前毁譽何須較酒裏功名定不虛只把廉勤替疏拙翻嫌苦苦學懸魚紅梅天然標致出羣品緑葉青枝説太狂卯酒醺酣紅玉軟春風觸撥瑞龍香清臞尚餘山澤相淡薄強隨時世粧更道北人初不識杏花應不敢承當春時兩日間為汗漫遊溪邊長是喚扁舟杯盤草草同真率笑語悠悠得細酬别墅橋欹泥沒膝東園亭小雨霑頭記一時實事不知桃李都開遍更趁殘花一醉休雨一片雲飛雨趁來常年此候捷如雷滿天盡黑都吹散俄頃還明又復回凖擬却無真失望等間易有竟難猜化工若念農辛苦早賜傾盆亦快哉巧夕前一日雨天時人事逐畨新轉盻初秋感慨頻月傍銀河移扇影天留絲雨洗香塵民間但欲逢豐歲酒裏何妨換好春一笑且隨吾意適燕支菱芡伴盤珍偶書事業從教下瀧舠一年竊祿在江臯腥汙砧几憎蠅賦愛護文書却鼠刀風約浮萍雲疊岫日藏老檜雨翻濤深慚無補公家事只願年豐弓載櫜聞方孚若信孺寺丞訃二首清時補外駕朱轓德政碑成達帝閽都把功名垂竹帛盡留官職付兒孫生前花藥千株在身後詞章幾卷存履道宅邊雲黯黯知誰挂劍酹清尊憶昨家君出帥時惟公英氣少人知要除五事心常在費盡千言氣不卑渺渺淮波紛棹楫晶晶霜日照旌旗論功未盡還知否應有名賢為立碑收潘廷亨逵訊舊年浙右水連天聞説閩中水亦然官裏勸分雖遍及民問慳糴為無錢大風拔木揚塵土細雨打花空媚妍甲子一晴差可喜農家只願屢豐年題蕭照漁樵對語圖世人大半愛漁樵不道漁樵心志凋漫釣溪魚臨月夕每沽村酒怕霜朝檀欒男女衣藍縷淡泊生涯舟蕩搖偷得片時相對語從頭至尾盡無聊間中憶曾舜卿知丞官舍如舟近古河隔河老木尚新峩森羅星象螢分度經緯水紋魚擲梭月滿秋容隨處好風含涼意向人多香蒲泉石供清玩遙憶騷翁在澗阿宿等慈僧房小小禪房若箇寬㲲巾楮帳護幽間貪看天外雲千變忘數簷前竹幾竿老衲呪經祈雨切臞翁煮粥當晨餐早知一念能持靜不學槐安蟻走盤姑惡一雙姑惡屋邊啼飛入垂楊伴夕暉不悟形骸非昔日但思怨恨沒休期婦聞孄語猶翻悔汝得佳名免此譏事事直須存分義從今緘口莫相疑冬晚冬晴日暖如春天墨雲忽過雨生寒定飛柳絮呈農瑞未放梅花到酒樽厯尾無多更舊歲筆端不韻祗陳言須臾刮地風聲壯吹折南牆老竹根按寒字出韻冬後書事兀坐茅簷意自間哦詩因得數苔斑一畨雨過歸寒水數片雲浮疊晚山近日隂晴多不定自來冷暖不相關春深泛棹清溪上穩釣漁村三兩灣天機詩泛觀物理任天機莫泥春殘事遽非蝶粉鶯衣隂處泊燕泥鷗雪雨中歸裝成間景真堪玩寫入清吟細解圍一榻涼風清午暑拙翁睡起理絺衣同鄉人别朱希文察判于詠春亭今春醵飲咏春亭水闊山遙眼界清前度來時多值雨今番到此却逢晴蠶方三幼餐乾葉燕喜雙飛泊短楹小别諸君休作惡陽關四疊不須成家園二首當年迂叟圃初成野草間花不記名康節巾車臨小徑東坡詩板照高楹久知氣象歸前輩擬學規模愧後生惟有至公能格物莫將險躁起心兵堪笑吾家五畝園新添石岸築雲軒眼看流水清無底靣揖羣山翠欲奔拂拂好風涼入座娟娟明月影侵門弟兄歲晚團欒處自摘青蔬薦酒尊次韻韋中實闕雨悶與世相違願不才春殘花底尚銜杯詩從碧霧愁邊得門向青山好處開東里沈君投檄去西鄰韋叟趁間來喜無俗駕知豫懶坐看庭隂閟古槐偶成前朝晴暖昨朝寒細雨催花聲不間處處閉門掃蠶蟻家家垂柳隱綿蠻東灣泛艇看人渡北埭扶笻向晚還惟有羣山怕陳迹輕煙冉冉薄螺鬟虛庭虛庭幽閴日陰移旋拂藤牀近小池雲自悠揚峰疉疊風常和暖日漪漪青衫漫仕安愚分白酒初篘滿屈巵竹外流螢三兩箇微光猶足映書帷西村籃輿軋軋過西村小麥青青雨露恩山色無窮開遠近民家守分度昕昏僧精持課歸林下客自攜尊醉竹根每日塵氛牽百念要須結屋浸溪痕南村郁李花開春漸殘海棠猶自映杯柈燕隨風舞迎人暖鳩喚雨來連夜寒兩水中分清可燭上陌澗水一自石瀨一自白竹塢合流自青林廟前匯入湘溪羣山環揖秀堪餐兒童成隊逢寒食紙剪飛鳶貼霧端病起秋深雨意轉連綿聲到枯荷清未眠久悟是非姑掩卷且看童稚互攤錢園蔬土潤青堪饌徑竹行疏翠可憐賸喜病夫今已健碧腴膏莫問人傳元微之病瘴白樂天自長安寄碧腴膏象山住持僧于修求詩戲題五十六字的知前聖定曾來山脈深長景漸開霜幹都無新氣象風幡不染舊塵埃漁樵雖過何嘗問父老相傳莫浪猜慚愧修公堅有請依前題作小天台催雪次韻韋中實海隱方搜催雪詩韋郎落筆補新辭雲邊花舞瓊千點座上風流玉一枝如許寒光宜應瑞不勝幻色又添奇政須瀹茗清靈府盡把文章潤色之費補之謂中實云古人有催雪詞未有作催雪詩中實賦此詩時雪已舞花故終篇及之溪上水痕依緑四無邊雨腳垂簷細更妍楊柳不遮愁處眼牡丹猶倚醉時肩紛紛燈火疑星燦汩汩聲名類蟻旋間憑蓬窗仍感舊開箱重為整詩篇
