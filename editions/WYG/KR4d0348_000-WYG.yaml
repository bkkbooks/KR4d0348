body:
  text: 提要張氏拙軒集六巻别集類三宋臣等謹案張氏拙軒集六巻宋張侃撰侃字直夫其事蹟不見扵史乘据集中自稱淮海則當為揚州人而自寳祐維揚志以下記廣陵人物者從不能舉其姓名獨錢􅄎秘閣書目載有張拙軒初稿四册焦竑國史經籍志有張侃拙軒稿四巻而宋藝文志書録觧題俱無之宋人江湖前後諸集及近時選録宋詩者亦多未之反則其湮晦扵世盖己久矣今永樂大典各韻内尚頗載其詩文或題拙軒集或題拙軒初稿勘驗標目與錢􅄎焦竑所記並合當即其書惟其人無可考見今即集中謝樓監丞為其父作行實一書反覆参核盖侃即開禧中知樞宻院張巖之子也案宋史巖以􅄁知政事進筦樞宻督視江淮軍馬書中稱其父訏謨兩社出董戎師歴官既已相符又巖附和韓侂胄用兵敗衂御史劾其朋姦誤國奪官而書中謂其父惟主扵和以靖國家或者不之察極力詆毁云云其言皆為父辨白益足與巖事相證史又稱巖家本大梁徙揚州紹興末渡江居湖州考集中歸來詩有結亭苕水旁句江淮録䟦中亦有吾家近西塞語知其卜宅吴興尤為確據至其生平宦蹟雖不盡詳以其詩文考之則嘗監常州犇牛鎮酒税遷為上虞丞尚畧見大槩巖以諂媚權姦致位通顯為世詬病而侃獨志趣蕭散浮沉末僚所與㳺者如趙師秀周文璞輩皆吟咏自適恬静不争之士故所作亦多清雋圓穏時有閒澹之致雖未能開闢門徑自成一家而其集久佚僅存實為世所未暏謹排訂編次釐為六巻俾言宋詩者猶得以知其名氏焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
